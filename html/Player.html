function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// Unified lyrics panel — absolutely positioned, animates top upward on expand
function LyricsPanel({ song, currentTime, fanchantMode, expanded, onExpand, onCollapse, onSeek, panelPos }) {
  const lines = fanchantMode ? FANCHANT : LYRICS;
  const activeLine = [...lines].reverse().find(l => currentTime >= l.time);
  const activeIdx = activeLine ? lines.indexOf(activeLine) : -1;
  const scrollRef = useRef(null);
  const swipeRef = useRef(null);

  useEffect(() => {
    if (!expanded || activeIdx < 0 || !scrollRef.current) return;
    const el = scrollRef.current.querySelectorAll('.lyric-line')[activeIdx];
    if (el) {
      const container = scrollRef.current;
      const target = el.offsetTop - container.clientHeight / 2 + el.clientHeight / 2;
      container.scrollTo({ top: target, behavior: 'smooth' });
    }
  }, [activeIdx, expanded]);

  const handleTouchStart = (e) => {
    // Don't track swipes that begin on the scrollable lyrics list when expanded —
    // those are scrolls/taps, not panel-collapse gestures.
    if (expanded && e.target.closest && e.target.closest('.lyrics-scroll')) {
      swipeRef.current = null;
      return;
    }
    swipeRef.current = e.touches[0].clientY;
  };
  const handleTouchEnd = (e) => {
    if (swipeRef.current === null) return;
    const dy = e.changedTouches[0].clientY - swipeRef.current;
    swipeRef.current = null;
    if (!expanded && dy < -20) onExpand();
    if (expanded && dy > 60) onCollapse();
  };

  const bgColor = `${song.colors[1]}cc`;
  const borderColor = `${song.accent}22`;

  return (
    <div
      data-no-player-swipe
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
      style={{
        position: 'absolute',
        top: expanded ? (panelPos?.expandedTop ?? 0) : (panelPos?.collapsedTop ?? 0),
        bottom: panelPos?.bottom ?? 0,
        left: panelPos?.left ?? 24,
        right: panelPos?.right ?? 24,
        visibility: panelPos ? 'visible' : 'hidden',
        transition: 'top 0.44s cubic-bezier(0.4, 0, 0.2, 1)',
        borderRadius: 16,
        background: bgColor,
        backdropFilter: 'blur(24px)',
        border: `1px solid ${borderColor}`,
        overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
        zIndex: 10,
      }}
    >
      {/* Drag handle — only visible when expanded */}
      {expanded && (
        <div
          onClick={onCollapse}
          style={{
            height: 28, flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer',
          }}
        >
          <div style={{
            width: 36, height: 3, borderRadius: 2,
            background: `${song.accent}55`,
          }} />
        </div>
      )}

      {/* Collapsed: current lyric line — only when not expanded */}
      {!expanded && (
        <div
          onClick={onExpand}
          style={{
            height: 44, flexShrink: 0,
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '0 16px', cursor: 'pointer',
            overflow: 'hidden',
          }}
        >
          <span style={{ opacity: 0.45, fontSize: 10, flexShrink: 0, color: song.lyricsColor }}>
            {fanchantMode ? '📣' : '♪'}
          </span>
          <span style={{
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1,
            color: song.lyricsColor, fontSize: 13, fontFamily: "'Noto Sans KR', sans-serif",
            fontWeight: 300, letterSpacing: 0.3,
          }}>
            {activeLine ? activeLine.text : (fanchantMode ? '팬챈트 준비 중...' : '가사 준비 중...')}
          </span>
        </div>
      )}

      {/* Expanded: scrollable lyrics — only rendered when expanded to avoid layout flash */}
      <div
        ref={scrollRef}
        className="lyrics-scroll"
        style={{
          flex: 1, overflowY: expanded ? 'scroll' : 'hidden',
          padding: expanded ? '4px 16px 24px' : '0',
          scrollbarWidth: 'none',
          opacity: expanded ? 1 : 0,
          transition: 'opacity 0.25s ease',
        }}
      >
        {lines.map((line, i) => (
          <div
            key={i}
            className="lyric-line"
            onClick={() => onSeek(line.time)}
            style={{
              padding: '9px 0',
              fontSize: i === activeIdx ? 15 : 13,
              fontWeight: i === activeIdx ? 600 : 300,

              transition: 'font-size 0.3s ease, color 0.3s ease',
              fontFamily: "'Noto Sans KR', sans-serif",
              letterSpacing: 0.2, lineHeight: 1.65,
              cursor: 'pointer',

            }}
          >
            {line.text}
          </div>
        ))}
      </div>
    </div>
  );
}

function ProgressBar({ progress, duration, onSeek, accent }) {
  const barRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const [localProgress, setLocalProgress] = useState(null);

  const getPos = (clientX) => {
    const rect = barRef.current.getBoundingClientRect();
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  };

  const handleStart = (e) => {
    setDragging(true);
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    setLocalProgress(getPos(clientX));
  };
  const handleMove = useCallback((e) => {
    if (!dragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    setLocalProgress(getPos(clientX));
  }, [dragging]);
  const handleEnd = useCallback((e) => {
    if (!dragging) return;
    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const p = getPos(clientX);
    onSeek(p * duration);
    setDragging(false);
    setLocalProgress(null);
  }, [dragging, duration, onSeek]);

  useEffect(() => {
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchmove', handleMove, { passive: true });
    window.addEventListener('touchend', handleEnd);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleEnd);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleEnd);
    };
  }, [handleMove, handleEnd]);

  const displayProgress = localProgress !== null ? localProgress : progress;
  const currentTime = displayProgress * duration;

  return (
    <div>
      {/* bar */}
      <div
        ref={barRef}
        onMouseDown={handleStart}
        onTouchStart={handleStart}
        style={{
          height: 36, display: 'flex', alignItems: 'center', cursor: 'pointer',
          padding: '0 2px',
        }}
      >
        <div style={{
          width: '100%', height: 3, borderRadius: 3,
          background: 'rgba(255,255,255,0.12)', position: 'relative',
        }}>
          <div style={{
            position: 'absolute', left: 0, top: 0, bottom: 0,
            width: `${displayProgress * 100}%`,
            borderRadius: 3,
            background: `linear-gradient(90deg, ${accent}88, ${accent})`,
            transition: dragging ? 'none' : 'width 0.3s linear',
          }} />
          <div style={{
            position: 'absolute', top: '50%',
            left: `${displayProgress * 100}%`,
            transform: 'translate(-50%, -50%)',
            width: dragging ? 16 : 10, height: dragging ? 16 : 10,
            borderRadius: '50%', background: '#fff',
            boxShadow: `0 0 12px ${accent}88`,
            transition: dragging ? 'none' : 'width 0.2s, height 0.2s',
          }} />
        </div>
      </div>
      {/* times */}
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        padding: '0 2px',
        fontFamily: "'DM Mono', monospace",
        fontSize: 11, color: 'rgba(255,255,255,0.35)', letterSpacing: 0.5,
        marginTop: -4,
      }}>
        <span>{formatTime(currentTime)}</span>
        <span>{formatTime(duration)}</span>
      </div>
    </div>
  );
}

function IconBtn({ onClick, active, size = 22, children, style = {} }) {
  const [pressed, setPressed] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{
        background: 'none', border: 'none', cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        width: size + 16, height: size + 16,
        borderRadius: '50%',
        transform: pressed ? 'scale(0.88)' : 'scale(1)',
        transition: 'transform 0.12s ease, opacity 0.12s ease',
        opacity: active === false ? 0.3 : 1,
        ...style,
      }}
    >
      {children}
    </button>
  );
}

// Queue sheet — slides up from bottom, covers to album cover midpoint
function QueueSheet({ songs, queue, setQueue, songIdx, queuePos, onSelect, onClose, onRemove, visible, sheetTop, sheetBottom, accent, shuffle, repeat, onToggleShuffle, onToggleRepeat }) {
  const dragState = useRef(null); // { idx, startY, currentY }
  const [draggingIdx, setDraggingIdx] = useState(null);
  const [dragOffsetY, setDragOffsetY] = useState(0);
  const [tempQueue, setTempQueue] = useState(queue);
  const swipeRef = useRef(null);
  // swipe-left-to-delete state
  const swipeDelRef = useRef(null);
  const [swipeIdx, setSwipeIdx] = useState(null);
  const [swipeDX, setSwipeDX] = useState(0);
  const [removingIdx, setRemovingIdx] = useState(null);

  useEffect(() => { setTempQueue(queue); }, [queue]);

  const startSwipe = (e, i) => {
    if (dragState.current) return;
    const t = e.touches ? e.touches[0] : e;
    swipeDelRef.current = { idx: i, startX: t.clientX, startY: t.clientY, dx: 0, locked: null };
  };
  useEffect(() => {
    const moveSwipe = (e) => {
      const s = swipeDelRef.current;
      if (!s) return;
      const t = e.touches ? e.touches[0] : e;
      const dx = t.clientX - s.startX;
      const dy = t.clientY - s.startY;
      if (s.locked === null) {
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          s.locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
        }
      }
      if (s.locked === 'h') {
        if (e.cancelable) e.preventDefault();
        const clamped = Math.min(0, Math.max(-180, dx));
        s.dx = clamped;
        setSwipeIdx(s.idx);
        setSwipeDX(clamped);
      }
    };
    const endSwipe = () => {
      const s = swipeDelRef.current;
      swipeDelRef.current = null;
      if (!s || s.locked !== 'h') { setSwipeIdx(null); setSwipeDX(0); return; }
      if (s.dx < -100 && tempQueue.length > 1) {
        setRemovingIdx(s.idx);
        setSwipeDX(-window.innerWidth);
        setTimeout(() => {
          const next = tempQueue.filter((_, i) => i !== s.idx);
          setTempQueue(next);
          setQueue(next);
          if (onRemove) onRemove(s.idx, next);
          setRemovingIdx(null);
          setSwipeIdx(null);
          setSwipeDX(0);
        }, 220);
      } else {
        setSwipeIdx(null);
        setSwipeDX(0);
      }
    };
    window.addEventListener('touchmove', moveSwipe, { passive: false });
    window.addEventListener('touchend', endSwipe);
    window.addEventListener('mousemove', moveSwipe);
    window.addEventListener('mouseup', endSwipe);
    return () => {
      window.removeEventListener('touchmove', moveSwipe);
      window.removeEventListener('touchend', endSwipe);
      window.removeEventListener('mousemove', moveSwipe);
      window.removeEventListener('mouseup', endSwipe);
    };
  }, [tempQueue, setQueue, onRemove]);

  const handleDragStart = (e, idx) => {
    e.stopPropagation();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragState.current = { idx, startY: clientY, currentY: clientY };
    setDraggingIdx(idx);
    setDragOffsetY(0);
  };

  const handleDragMove = useCallback((e) => {
    if (!dragState.current) return;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = clientY - dragState.current.currentY;
    dragState.current.currentY = clientY;
    setDragOffsetY(o => o + dy);
    // reorder
    const itemH = 64;
    const totalDy = clientY - dragState.current.startY;
    const shift = Math.round(totalDy / itemH);
    const newIdx = Math.max(0, Math.min(tempQueue.length - 1, dragState.current.idx + shift));
    if (newIdx !== dragState.current.idx) {
      const next = [...tempQueue];
      const [item] = next.splice(dragState.current.idx, 1);
      next.splice(newIdx, 0, item);
      dragState.current.startY = clientY;
      dragState.current.idx = newIdx;
      setDraggingIdx(newIdx);
      setDragOffsetY(0);
      setTempQueue(next);
    }
  }, [tempQueue]);

  const handleDragEnd = useCallback(() => {
    if (!dragState.current) return;
    dragState.current = null;
    setDraggingIdx(null);
    setDragOffsetY(0);
    setQueue(tempQueue);
  }, [tempQueue, setQueue]);

  useEffect(() => {
    window.addEventListener('mousemove', handleDragMove);
    window.addEventListener('mouseup', handleDragEnd);
    window.addEventListener('touchmove', handleDragMove, { passive: false });
    window.addEventListener('touchend', handleDragEnd);
    return () => {
      window.removeEventListener('mousemove', handleDragMove);
      window.removeEventListener('mouseup', handleDragEnd);
      window.removeEventListener('touchmove', handleDragMove);
      window.removeEventListener('touchend', handleDragEnd);
    };
  }, [handleDragMove, handleDragEnd]);

  const handleSheetSwipe = (e) => { swipeRef.current = e.touches[0].clientY; };
  const handleSheetSwipeEnd = (e) => {
    if (!swipeRef.current) return;
    const dy = e.changedTouches[0].clientY - swipeRef.current;
    swipeRef.current = null;
    if (dy > 60) onClose();
  };

  return (
    <div data-no-player-swipe style={{
      position: 'absolute', inset: 0, zIndex: 20, pointerEvents: visible ? 'auto' : 'none',
    }}>
      {/* dim overlay */}
      <div
        onClick={onClose}
        style={{
          position: 'absolute', inset: 0,
          background: 'rgba(0,0,0,0.45)',
          opacity: visible ? 1 : 0,
          transition: 'opacity 0.44s cubic-bezier(0.4, 0, 0.2, 1)',
          pointerEvents: visible ? 'auto' : 'none',
        }}
      />
      {/* sheet */}
      <div
        style={{
          position: 'absolute',
          top: sheetTop,
          bottom: sheetBottom,
          left: 0, right: 0,
          background: '#16161c',
          borderRadius: '20px 20px 0 0',
          border: '1px solid rgba(255,255,255,0.07)',
          display: 'flex', flexDirection: 'column',
          boxShadow: '0 -8px 40px rgba(0,0,0,0.6)',
          transform: visible ? 'translateY(0)' : 'translateY(100%)',
          transition: 'transform 0.44s cubic-bezier(0.4, 0, 0.2, 1)',
        }}
      >
        {/* drag handle — only this area triggers close-swipe */}
        <div
          onClick={onClose}
          onTouchStart={handleSheetSwipe}
          onTouchEnd={handleSheetSwipeEnd}
          style={{
            height: 28, flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer',
            touchAction: 'none',
          }}
        >
          <div style={{ width: 36, height: 3, borderRadius: 2, background: 'rgba(255,255,255,0.25)' }} />
        </div>
        {/* header */}
        <div style={{
          padding: '0 16px 10px 20px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          flexShrink: 0,
        }}>
          <div style={{
            fontFamily: "'DM Mono', monospace",
            fontSize: 11, color: 'rgba(255,255,255,0.3)', letterSpacing: 2,
          }}>QUEUE — {tempQueue.length} TRACKS</div>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <div
              onClick={(e) => { e.stopPropagation(); onToggleShuffle && onToggleShuffle(); }}
              style={{
                width: 32, height: 32, borderRadius: 16, display: 'flex',
                alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
              }}
            >
              <ShuffleIcon color={shuffle ? '#fff' : 'rgba(255,255,255,0.45)'} />
            </div>
            <div
              onClick={(e) => { e.stopPropagation(); onToggleRepeat && onToggleRepeat(); }}
              style={{
                width: 32, height: 32, borderRadius: 16, display: 'flex',
                alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
              }}
            >
              <RepeatIcon color={repeat > 0 ? '#fff' : 'rgba(255,255,255,0.45)'} one={repeat === 2} />
            </div>
          </div>
        </div>
        {/* list */}
        <div style={{ flex: 1, overflowY: 'scroll', scrollbarWidth: 'none', padding: '0 12px 16px' }}>
          {tempQueue.map((sIdx, i) => {
            const s = songs[sIdx];
            const isCurrent = i === queuePos;
            const isDragging = i === draggingIdx;
            const isSwiping = swipeIdx === i;
            const isRemoving = removingIdx === i;
            const tx = (isSwiping || isRemoving) ? swipeDX : 0;
            return (
              <div
                key={`${sIdx}-${i}`}
                onTouchStart={(e) => startSwipe(e, i)}
                onMouseDown={(e) => startSwipe(e, i)}
                style={{ position: 'relative', overflow: 'hidden', borderRadius: 12, touchAction: 'pan-y' }}
              >
                {/* delete background */}
                <div style={{
                  position: 'absolute', inset: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
                  paddingRight: 20,
                  background: 'linear-gradient(90deg, transparent 0%, #c0392b 60%, #e74c3c 100%)',
                  opacity: (isSwiping || isRemoving) ? 1 : 0,
                  color: '#fff', fontFamily: "'DM Mono', monospace",
                  fontSize: 12, letterSpacing: 2, fontWeight: 600,
                  pointerEvents: 'none',
                }}>삭제</div>
                <div
                  onClick={() => { if (Math.abs(swipeDX) < 4) onSelect(i); }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    padding: '10px 8px',
                    borderRadius: 12,
                    background: isCurrent ? 'rgba(28,28,36,1)' : '#16161c',
                    backgroundImage: isCurrent ? 'linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06))' : 'none',
                    transform: isDragging
                      ? `translateY(${dragOffsetY}px) scale(1.02)`
                      : `translateX(${tx}px)`,
                    transition: (isDragging || isSwiping)
                      ? 'none'
                      : 'transform 0.22s cubic-bezier(0.4,0,0.2,1), background 0.2s ease',
                    cursor: 'pointer',
                    zIndex: isDragging ? 2 : 1,
                    position: 'relative',
                    boxShadow: isDragging ? '0 8px 24px rgba(0,0,0,0.5)' : 'none',
                    touchAction: 'pan-y',
                  }}
                >
                  <MiniCoverArt song={s} size={44} />
                <div style={{ flex: 1, overflow: 'hidden' }}>
                  <div style={{
                    fontSize: 14, fontWeight: isCurrent ? 600 : 400,
                    color: isCurrent ? '#fff' : 'rgba(255,255,255,0.75)',
                    whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                    fontFamily: "'Noto Sans KR', sans-serif",
                  }}>{s.title}</div>
                  <div style={{
                    fontSize: 12, color: 'rgba(255,255,255,0.35)',
                    marginTop: 2, fontFamily: "'Noto Sans KR', sans-serif", fontWeight: 300,
                    display: 'flex', gap: 6, alignItems: 'center',
                  }}>
                    <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.artist}</span>
                    <span style={{ opacity: 0.4, flexShrink: 0 }}>·</span>
                    <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, flexShrink: 0 }}>{formatTime(s.duration)}</span>
                  </div>
                </div>
                {/* drag handle btn */}
                <div
                  onMouseDown={(e) => handleDragStart(e, i)}
                  onTouchStart={(e) => { e.stopPropagation(); handleDragStart(e, i); }}
                  onClick={e => e.stopPropagation()}
                  style={{
                    padding: '4px 6px', cursor: 'grab', flexShrink: 0,
                    display: 'flex', alignItems: 'center',
                  }}
                >
                  <QueueIcon color="rgba(255,255,255,0.25)" />
                </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Player() {
  // Load queue first so we can resolve queuePos from songIdx
  const [queue, setQueue] = useState(() => {
    try {
      const s = localStorage.getItem('player_queue');
      if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length) return a; }
    } catch(e) {}
    return SONGS.map((_, i) => i);
  });
  const [queuePos, setQueuePos] = useState(() => {
    const targetIdx = parseInt(localStorage.getItem('player_songIdx') || '0');
    let q;
    try { q = JSON.parse(localStorage.getItem('player_queue')); } catch(e) {}
    if (!Array.isArray(q) || !q.length) q = SONGS.map((_, i) => i);
    const pos = q.indexOf(targetIdx);
    return pos >= 0 ? pos : 0;
  });
  const [isPlaying, setIsPlaying] = useState(() => {
    const saved = localStorage.getItem('player_isPlaying');
    return saved === null ? true : saved === '1';
  });
  const [currentTime, setCurrentTime] = useState(() => {
    const saved = localStorage.getItem('player_currentTime');
    return saved !== null ? parseFloat(saved) : 0;
  });
  const [shuffle, setShuffle] = useState(false);
  const [repeat, setRepeat] = useState(0);
  const [lyricsExpanded, setLyricsExpanded] = useState(false);
  const [fanchantMode, setFanchantMode] = useState(false);
  const [liked, setLiked] = useState(false);
  const [queueOpen, setQueueOpen] = useState(false);
  const [transition, setTransition] = useState('entering'); // 'entering' | 'idle' | 'leaving'
  const [dragY, setDragY] = useState(0);
  const dragRef = useRef(null);
  const coverRef = useRef(null);
  const pillRef = useRef(null);
  const mainRef = useRef(null);
  const [panelPos, setPanelPos] = useState(null);
  const [queueSheetTop, setQueueSheetTop] = useState(null);

  const songIdx = queue[Math.min(queuePos, queue.length - 1)] ?? 0;
  const song = SONGS[songIdx] || SONGS[0];
  const progress = currentTime / song.duration;

  // Persist for sync
  useEffect(() => { localStorage.setItem('player_songIdx', songIdx); }, [songIdx]);
  useEffect(() => { localStorage.setItem('player_isPlaying', isPlaying ? '1' : '0'); }, [isPlaying]);
  useEffect(() => { localStorage.setItem('player_currentTime', currentTime); }, [currentTime]);
  useEffect(() => {
    localStorage.setItem('player_queue', JSON.stringify(queue));
    if (typeof window !== 'undefined' && window.parent !== window) {
      window.parent.postMessage({ type: 'player_queue_changed', queue, songIdx: queue[Math.min(queuePos, queue.length - 1)] }, '*');
    }
  }, [queue, queuePos]);

  const isOverlay = typeof window !== 'undefined' && new URLSearchParams(window.location.search).get('overlay') === '1';

  useEffect(() => {
    sessionStorage.removeItem('coming_from_home');
    if (isOverlay) {
      setTransition('idle');
    } else {
      requestAnimationFrame(() => {
        setTimeout(() => setTransition('idle'), 30);
      });
    }
  }, []);

  const mounted = transition !== 'entering';

  const goBackHome = () => {
    if (transition === 'leaving') return;
    if (isOverlay) {
      window.parent.postMessage({ type: 'player_close' }, '*');
      return;
    }
    setTransition('leaving');
    setTimeout(() => { window.location.href = 'Home.html'; }, 360);
  };

  // Swipe-down to dismiss — but ignore swipes that start inside the lyrics panel
  const handleTouchStart = (e) => {
    if (transition !== 'idle') return;
    if (e.target.closest && e.target.closest('[data-no-player-swipe]')) {
      dragRef.current = null;
      return;
    }
    dragRef.current = { startY: e.touches[0].clientY, active: true };
  };
  const handleTouchMove = (e) => {
    if (!dragRef.current?.active) return;
    const dy = e.touches[0].clientY - dragRef.current.startY;
    if (dy > 0) {
      setDragY(dy);
      if (isOverlay) window.parent.postMessage({ type: 'player_drag', dy }, '*');
    }
  };
  const handleTouchEnd = () => {
    if (!dragRef.current?.active) return;
    const dy = dragY;
    dragRef.current = null;
    if (isOverlay) {
      window.parent.postMessage({ type: 'player_drag_end', dy }, '*');
      setDragY(0);
      return;
    }
    if (dy > 120) {
      goBackHome();
    } else {
      setDragY(0);
    }
  };

  const computePanel = useCallback(() => {
    if (!coverRef.current || !pillRef.current || !mainRef.current) return;
    const containerTop = mainRef.current.getBoundingClientRect().top;
    const coverRect = coverRef.current.getBoundingClientRect();
    const pillRect = pillRef.current.getBoundingClientRect();
    const containerH = mainRef.current.offsetHeight;
    setPanelPos({
      expandedTop: coverRect.top - containerTop,
      collapsedTop: pillRect.top - containerTop,
      bottom: containerH - (pillRect.bottom - containerTop),
      left: 28, right: 28,
    });
    // queue sheet: top = midpoint of album cover
    const coverMid = coverRect.top + coverRect.height / 2 - containerTop;
    setQueueSheetTop(coverMid);
  }, []);

  React.useLayoutEffect(() => { computePanel(); }, []);
  React.useLayoutEffect(() => { computePanel(); }, [queuePos]);

  // Tick — only advances time
  useEffect(() => {
    if (!isPlaying) return;
    const id = setInterval(() => {
      setCurrentTime(t => Math.min(t + 0.5, song.duration));
    }, 500);
    return () => clearInterval(id);
  }, [isPlaying, song.duration]);

  // Handle end-of-song separately so we don't race with batched state updates
  useEffect(() => {
    if (!isPlaying) return;
    if (currentTime < song.duration) return;
    // repeat: 0 = off, 1 = all, 2 = one
    if (repeat === 2) { setCurrentTime(0); return; }
    if (queuePos + 1 < queue.length) {
      setQueuePos(queuePos + 1);
      setCurrentTime(0);
      return;
    }
    if (repeat === 1) {
      setQueuePos(0);
      setCurrentTime(0);
      return;
    }
    // off — stop at end of queue
    setIsPlaying(false);
  }, [currentTime, song.duration, isPlaying, repeat, queuePos, queue.length]);

  const handlePrev = () => {
    if (currentTime > 3) { setCurrentTime(0); return; }
    setQueuePos(p => (p - 1 + queue.length) % queue.length);
    setCurrentTime(0);
  };
  const handleNext = () => {
    setQueuePos(p => (p + 1) % queue.length);
    setCurrentTime(0);
  };
  const handleSeek = (t) => setCurrentTime(t);
  const toggleRepeat = () => setRepeat(r => (r + 1) % 3);

  // shuffle: preserves pre-shuffle order so toggling off restores it
  const preShuffleQueueRef = useRef(null);
  const toggleShuffle = () => {
    if (!shuffle) {
      preShuffleQueueRef.current = queue;
      const cur = queue[queuePos];
      const rest = queue.filter((_, i) => i !== queuePos);
      for (let i = rest.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [rest[i], rest[j]] = [rest[j], rest[i]];
      }
      setQueue([cur, ...rest]);
      setQueuePos(0);
      setShuffle(true);
    } else {
      const original = preShuffleQueueRef.current;
      if (original && original.length) {
        const cur = queue[queuePos];
        const newPos = original.indexOf(cur);
        setQueue(original);
        setQueuePos(newPos >= 0 ? newPos : 0);
      }
      setShuffle(false);
    }
  };

  const containerStyle = {
    width: '100%', maxWidth: 430,
    height: '100dvh', maxHeight: 900,
    position: 'relative', overflow: 'hidden',
    background: `radial-gradient(ellipse at 50% -10%, ${song.colors[2]}cc 0%, ${song.colors[1]}88 35%, ${song.colors[0]} 70%, #060608 100%)`,
    display: 'flex', flexDirection: 'column',
    transform: isOverlay
      ? `translateY(${dragY}px)`
      : (transition === 'entering'
        ? 'translateY(100%)'
        : transition === 'leaving'
          ? 'translateY(100%)'
          : `translateY(${dragY}px)`),
    transition: dragRef.current?.active
      ? 'none'
      : 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1), background 1.2s ease',
  };

  return (
    <div
      ref={mainRef}
      style={containerStyle}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
    >
      {/* ambient glow */}
      <div style={{
        position: 'absolute', top: -80, left: '50%', transform: 'translateX(-50%)',
        width: 300, height: 300, borderRadius: '50%',
        background: `radial-gradient(circle, ${song.coverAccent}33, transparent 70%)`,
        filter: 'blur(40px)', transition: 'background 1.2s ease',
        pointerEvents: 'none',
      }} />

      {/* TOP BAR */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '56px 20px 20px', flexShrink: 0,
      }}>
        <IconBtn onClick={goBackHome}>
          <ChevronDownIcon color="rgba(255,255,255,0.85)" />
        </IconBtn>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: 'rgba(255,255,255,0.35)', letterSpacing: 2 }}>
          NOW PLAYING
        </div>
        <IconBtn onClick={() => {}}>
          <MoreIcon color="rgba(255,255,255,0.7)" />
        </IconBtn>
      </div>

      {/* ALBUM COVER */}
      <div ref={coverRef} style={{ padding: '0 28px', flexShrink: 0 }}>
        <AlbumCover song={song} isPlaying={isPlaying} />
      </div>

      {/* placeholder for lyrics pill */}
      <div ref={pillRef} style={{ height: 44, margin: '16px 28px 0', flexShrink: 0 }} />

      {/* LYRICS PANEL */}
      <LyricsPanel
        song={song}
        currentTime={currentTime}
        fanchantMode={fanchantMode}
        expanded={lyricsExpanded}
        onExpand={() => setLyricsExpanded(true)}
        onCollapse={() => setLyricsExpanded(false)}
        onSeek={handleSeek}
        panelPos={panelPos}
      />

      <div style={{ flex: 1 }} />

      {/* BOTTOM SECTION */}
      <div style={{ padding: '0 24px 36px', flexShrink: 0 }}>

        {/* Song info + like btn */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: 12, marginBottom: 20,
        }}>
          <div style={{ flex: 1, textAlign: 'left', overflow: 'hidden' }}>
            <div style={{
              fontFamily: "'Noto Serif KR', serif",
              fontSize: 22, fontWeight: 900, color: '#fff',
              letterSpacing: -0.5, lineHeight: 1.2,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{song.title}</div>
            <div style={{
              fontSize: 13, fontWeight: 300, color: 'rgba(255,255,255,0.5)',
              marginTop: 4, letterSpacing: 0.3,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{song.artist} · {song.album}</div>
          </div>
          <button
            onClick={() => setLiked(l => !l)}
            style={{
              flexShrink: 0, width: 44, height: 44, borderRadius: 14,
              background: 'transparent',
              border: 'none',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'all 0.3s ease', backdropFilter: 'blur(10px)',
            }}
          >
            <HeartIcon color={liked ? song.accent : 'rgba(255,255,255,0.5)'} filled={liked} />
          </button>
        </div>

        {/* Progress bar */}
        <ProgressBar progress={progress} duration={song.duration} onSeek={handleSeek} accent={song.accent} />

        {/* Main controls */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginTop: 12,
        }}>
          <IconBtn onClick={toggleShuffle} active={shuffle} size={20}>
            <ShuffleIcon color={shuffle ? song.accent : 'rgba(255,255,255,0.7)'} />
          </IconBtn>
          <IconBtn onClick={handlePrev} size={24}>
            <PrevIcon color="rgba(255,255,255,0.85)" />
          </IconBtn>
          <button
            onClick={() => {
              if (!isPlaying && currentTime >= song.duration) setCurrentTime(0);
              setIsPlaying(p => !p);
            }}
            style={{
              width: 72, height: 72, borderRadius: '50%',
              background: `linear-gradient(135deg, ${song.colors[2]}, ${song.coverAccent})`,
              border: `1.5px solid ${song.accent}44`,
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: `0 8px 32px ${song.coverAccent}55, 0 2px 8px rgba(0,0,0,0.5)`,
              transition: 'transform 0.12s ease, box-shadow 0.3s ease',
            }}
            onMouseDown={e => e.currentTarget.style.transform = 'scale(0.92)'}
            onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
            onTouchStart={e => e.currentTarget.style.transform = 'scale(0.92)'}
            onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
          >
            {isPlaying ? <PauseIcon color="#fff" /> : <PlayIcon color="#fff" />}
          </button>
          <IconBtn onClick={handleNext} size={24}>
            <NextIcon color="rgba(255,255,255,0.85)" />
          </IconBtn>
          <IconBtn onClick={toggleRepeat} active={repeat > 0} size={20}>
            <RepeatIcon color={repeat > 0 ? song.accent : 'rgba(255,255,255,0.7)'} one={repeat === 2} />
          </IconBtn>
        </div>

        {/* Fanchant + Queue row */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginTop: 8, padding: '0 4px',
        }}>
          {/* Fanchant btn */}
          <button
            onClick={() => setFanchantMode(m => !m)}
            style={{
              background: 'transparent',
              border: 'none', cursor: 'pointer',
              display: 'flex', alignItems: 'center',
              padding: '8px 12px', borderRadius: 10,
              transition: 'background 0.2s ease',
            }}
          >
            <FanchantIcon color={fanchantMode ? song.accent : 'rgba(255,255,255,0.4)'} active={fanchantMode} />
          </button>

          {/* Queue btn */}
          <button
            onClick={() => setQueueOpen(true)}
            style={{
              background: queueOpen ? 'rgba(255,255,255,0.08)' : 'transparent',
              border: 'none', cursor: 'pointer',
              display: 'flex', alignItems: 'center',
              padding: '8px 12px', borderRadius: 10,
              transition: 'background 0.2s ease',
            }}
          >
            <QueueIcon color="rgba(255,255,255,0.4)" />
          </button>
        </div>
      </div>

      {/* QUEUE SHEET */}
      {queueSheetTop !== null && (
        <QueueSheet
          visible={queueOpen}
          songs={SONGS}
          queue={queue}
          setQueue={newQueue => {
              const newPos = newQueue.indexOf(songIdx);
              setQueue(newQueue);
              if (newPos !== -1) setQueuePos(newPos);
              else setQueuePos(p => Math.min(p, Math.max(0, newQueue.length - 1)));
            }}
          onRemove={(removedIdx, newQueue) => {
            if (removedIdx < queuePos) setQueuePos(p => Math.max(0, p - 1));
            else if (removedIdx === queuePos) {
              setQueuePos(p => Math.min(p, Math.max(0, newQueue.length - 1)));
              setCurrentTime(0);
            }
          }}
          songIdx={songIdx}
          queuePos={queuePos}
          onSelect={i => { setQueuePos(i); setCurrentTime(0); }}
          onClose={() => setQueueOpen(false)}
          sheetTop={queueSheetTop}
          sheetBottom={0}
          accent={song.accent}
          shuffle={shuffle}
          repeat={repeat}
          onToggleShuffle={toggleShuffle}
          onToggleRepeat={toggleRepeat}
        />
      )}

      <style>{`
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes playerExpand {
          0%   { left: 12px; right: 12px; top: auto; bottom: 80px; height: 68px; border-radius: 16px; }
          100% { left: 0;    right: 0;    top: 0;    bottom: 0;    height: 100dvh; border-radius: 0; }
        }
        @keyframes playerCollapse {
          0%   { left: 0;    right: 0;    top: 0;    bottom: 0;    height: 100dvh; border-radius: 0; opacity: 1; }
          100% { left: 12px; right: 12px; top: auto; bottom: 80px; height: 68px; border-radius: 16px; opacity: 0; }
        }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Player />);
</script>
</body>
</html>
