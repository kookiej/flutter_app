function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;

// Horizontal row card (recent/recommended)
function SongRow({ song, onPlay, onSwipeAdd, index }) {
  const [pressed, setPressed] = useState(false);
  const [dx, setDx] = useState(0);
  const sr = useRef(null);
  const swiped = useRef(false);
  const onTS = (e) => { const t = e.touches[0]; sr.current = { x: t.clientX, y: t.clientY, locked: null }; setPressed(true); };
  const onTM = (e) => {
    if (!sr.current) return;
    const t = e.touches[0]; const ddx = t.clientX - sr.current.x; const ddy = t.clientY - sr.current.y;
    if (!sr.current.locked && (Math.abs(ddx) > 8 || Math.abs(ddy) > 8)) sr.current.locked = Math.abs(ddx) > Math.abs(ddy) ? 'h' : 'v';
    if (sr.current.locked === 'h' && ddx > 0) setDx(Math.min(ddx, 140));
  };
  const onTE = () => {
    setPressed(false);
    const wasH = sr.current?.locked === 'h'; const final = dx; sr.current = null;
    if (wasH && final > 70 && onSwipeAdd) { swiped.current = true; onSwipeAdd(); setDx(0); setTimeout(() => { swiped.current = false; }, 400); }
    else setDx(0);
  };
  const handleClick = () => { if (!swiped.current) onPlay(); };
  return (
    <div style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', paddingLeft: 28,
        background: 'linear-gradient(90deg, rgba(80,160,120,0.55) 0%, rgba(80,160,120,0.12) 70%, transparent 100%)',
        opacity: dx > 0 ? Math.min(1, dx / 70) : 0,
        color: '#fff', fontSize: 13, fontFamily: "'Noto Sans KR', sans-serif", fontWeight: 500,
        pointerEvents: 'none',
      }}>＋ 재생목록에 추가</div>
    <div
      onClick={handleClick}
      onTouchStart={onTS}
      onTouchMove={onTM}
      onTouchEnd={onTE}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 12,
        padding: '10px 20px',
        background: pressed ? 'rgba(255,255,255,0.04)' : 'transparent',
        transform: `translateX(${dx}px)`,
        transition: dx === 0 ? 'transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.15s ease' : 'background 0.15s ease',
        cursor: 'pointer', touchAction: 'pan-y', position: 'relative',
      }}
    >
      <div style={{
        width: 20, flexShrink: 0, textAlign: 'center',
        fontFamily: "'DM Mono', monospace", fontSize: 11,
        color: 'rgba(255,255,255,0.2)',
      }}>{index + 1}</div>
      <MiniCover song={song} size={48} radius={12} />
      <div style={{ flex: 1, overflow: 'hidden' }}>
        <div style={{
          fontFamily: "'Noto Sans KR', sans-serif",
          fontSize: 14, fontWeight: 500, color: '#fff',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>{song.title}</div>
        <div style={{
          fontSize: 12, fontWeight: 300, color: 'rgba(255,255,255,0.35)',
          marginTop: 2,
        }}>{song.artist}</div>
      </div>
      <span style={{
        fontFamily: "'DM Mono', monospace", fontSize: 11,
        color: 'rgba(255,255,255,0.25)', flexShrink: 0,
      }}>{formatTime(song.duration)}</span>
    </div>
    </div>
  );
}

function ProfileEditView({ active, profile, onSave, onBack }) {
  const ACCENT = '#a78bfa';
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState(profile.name);
  const [photo, setPhoto] = useState(profile.photo);
  const [colorIdx, setColorIdx] = useState(profile.colorIdx);
  const fileRef = useRef(null);
  const resetDraft = () => { setName(profile.name); setPhoto(profile.photo); setColorIdx(profile.colorIdx); };
  useEffect(() => {
    if (active) { setEditing(false); setName(profile.name); setPhoto(profile.photo); setColorIdx(profile.colorIdx); }
  }, [active]);
  const pickPhoto = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto(r.result);
    r.readAsDataURL(f);
  };
  const pal = AVATAR_PALETTE[colorIdx] || AVATAR_PALETTE[0];
  const handleBack = () => { if (editing) { resetDraft(); setEditing(false); } else { onBack(); } };
  const handleSave = () => { onSave({ name: name.trim() || profile.name, photo, colorIdx }); setEditing(false); };
  const editBtn = !editing ? (
    <button onClick={() => setEditing(true)} style={{ width: 40, height: 40, borderRadius: '50%', background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4 12.5-12.5z" stroke={ACCENT} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </button>
  ) : null;
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 3, background: 'linear-gradient(160deg, #17141f 0%, #0f0d16 100%)',
      transform: active ? 'translateX(0)' : 'translateX(100%)', transition: 'transform 0.36s cubic-bezier(0.4,0,0.2,1)',
      display: 'flex', flexDirection: 'column', pointerEvents: active ? 'auto' : 'none' }}>
      <SubHeader title="프로필 보기" onBack={handleBack} right={editBtn} />
      <div style={{ flex: 1, overflowY: 'auto', scrollbarWidth: 'none', padding: '26px 24px 30px' }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
          <div style={{ position: 'relative' }}>
            <div style={{ width: 104, height: 104, borderRadius: '50%',
              background: photo ? `url(${photo}) center/cover no-repeat` : `linear-gradient(135deg, ${pal[0]}, ${pal[1]})`,
              border: '2px solid rgba(167,139,250,0.35)', boxShadow: '0 8px 28px rgba(124,58,237,0.3)',
              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {!photo && <span style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 40, fontWeight: 900, color: '#fff' }}>{(name || '?').charAt(0).toUpperCase()}</span>}
            </div>
            {editing && (
              <button onClick={() => fileRef.current && fileRef.current.click()} style={{ position: 'absolute', right: -2, bottom: -2,
                width: 34, height: 34, borderRadius: '50%', background: ACCENT, border: '3px solid #15121f', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="#15121f" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><circle cx="12" cy="13" r="4" stroke="#15121f" strokeWidth="2"/></svg>
              </button>
            )}
            <input ref={fileRef} type="file" accept="image/*" onChange={pickPhoto} style={{ display: 'none' }} />
          </div>
          {editing && photo && <button onClick={() => setPhoto(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'rgba(255,255,255,0.4)', fontFamily: "'Noto Sans KR', sans-serif", fontSize: 11 }}>사진 제거</button>}
        </div>
        {editing && (
          <div style={{ marginTop: 22 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 2, color: 'rgba(255,255,255,0.3)', marginBottom: 12 }}>프로필 색상</div>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {AVATAR_PALETTE.map((p, i) => (
                <button key={i} onClick={() => { setColorIdx(i); setPhoto(null); }} style={{
                  width: 40, height: 40, borderRadius: '50%', cursor: 'pointer',
                  background: `linear-gradient(135deg, ${p[0]}, ${p[1]})`,
                  border: (colorIdx === i && !photo) ? '2.5px solid #fff' : '2.5px solid transparent',
                  boxShadow: (colorIdx === i && !photo) ? `0 0 0 2px ${ACCENT}` : 'none' }} />
              ))}
            </div>
          </div>
        )}
        <div style={{ marginTop: 26 }}>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: 2, color: 'rgba(255,255,255,0.3)', marginBottom: 10 }}>닉네임</div>
          {editing ? (
            <input value={name} onChange={e => setName(e.target.value)} maxLength={20} placeholder="닉네임 입력"
              style={{ width: '100%', boxSizing: 'border-box', padding: '14px 16px', borderRadius: 14,
                background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', color: '#fff',
                fontFamily: "'Noto Sans KR', sans-serif", fontSize: 15, outline: 'none' }} />
          ) : (
            <div style={{ width: '100%', boxSizing: 'border-box', padding: '14px 16px', borderRadius: 14,
              background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', color: '#fff',
              fontFamily: "'Noto Sans KR', sans-serif", fontSize: 15 }}>{name}</div>
          )}
        </div>
      </div>
      {editing && (
        <div style={{ padding: '14px 24px 26px', flexShrink: 0 }}>
          <button onClick={handleSave} style={{
            width: '100%', height: 52, borderRadius: 26, border: 'none', cursor: 'pointer',
            background: 'linear-gradient(135deg, #4a2fa0, #7c3aed)', color: '#fff',
            fontFamily: "'Noto Sans KR', sans-serif", fontSize: 15, fontWeight: 700,
            boxShadow: '0 8px 24px rgba(124,58,237,0.4)' }}>저장</button>
        </div>
      )}
    </div>
  );
}

      display: 'flex', flexDirection: 'column', pointerEvents: active ? 'auto' : 'none' }}>
      <SubHeader title="알림" onBack={onBack} right={hasUnread ? (
        <button onClick={onMarkAll} style={{ background: 'none', border: 'none', cursor: 'pointer', color: ACCENT, fontFamily: "'Noto Sans KR', sans-serif", fontSize: 12, padding: '8px 10px' }}>모두 읽음</button>

function ProfilePanel({ visible, onClose, onNotifsChange }) {
  const [notifs, setNotifs] = useState(MOCK_NOTIFS);
  const swipeRef = useRef(null);
  const ACCENT = '#a78bfa';
  const hasUnread = notifs.some(n => !n.read);

  const [subView, setSubView] = useState(null);
  const [profile, setProfile] = useState(() => ({
    name: localStorage.getItem('profile_name') || USER_NAME,
    photo: localStorage.getItem('profile_photo') || null,
    colorIdx: parseInt(localStorage.getItem('profile_colorIdx') || '0', 10) || 0,
  }));
  useEffect(() => { if (!visible) setSubView(null); }, [visible]);
  const saveProfile = (p) => {
    setProfile(p);
    localStorage.setItem('profile_name', p.name);
    if (p.photo) localStorage.setItem('profile_photo', p.photo);
    localStorage.setItem('profile_colorIdx', String(p.colorIdx));
  };
  const markAll = () => {
    const next = notifs.map(n => ({ ...n, read: true }));
    setNotifs(next);
    if (onNotifsChange) onNotifsChange(next);
  };
  const logout = () => {
    localStorage.removeItem('login_provider');
    window.location.href = 'Login.html';
  };
  const renderAvatar = (size, fontSize) => {
    const pal = AVATAR_PALETTE[profile.colorIdx] || AVATAR_PALETTE[0];
    return (
      <div style={{
        width: size, height: size, borderRadius: '50%', flexShrink: 0,
        background: profile.photo ? `url(${profile.photo}) center/cover no-repeat` : `linear-gradient(135deg, ${pal[0]}, ${pal[1]})`,
        border: '1.5px solid rgba(167,139,250,0.3)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: '0 4px 16px rgba(124,58,237,0.2)',
      }}>
        {!profile.photo && (
          <span style={{ fontFamily: "'Noto Serif KR', serif", fontSize, fontWeight: 900, color: '#fff' }}>{profile.name.charAt(0).toUpperCase()}</span>
        )}
      </div>
    );
  };

  const markRead = (id) => {
    const next = notifs.map(n => n.id === id ? { ...n, read: true } : n);
    setNotifs(next);
    if (onNotifsChange) onNotifsChange(next);
  };



  const handleTouchStart = (e) => { swipeRef.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (swipeRef.current === null) return;
    const dx = e.changedTouches[0].clientX - swipeRef.current;
    swipeRef.current = null;
    if (dx > 60) onClose();
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 30,
      pointerEvents: visible ? 'auto' : 'none',
    }}>
      {/* dim overlay */}
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: 'rgba(0,0,0,0.5)',
        opacity: visible ? 1 : 0,
        transition: 'opacity 0.4s cubic-bezier(0.4,0,0.2,1)',
        pointerEvents: visible ? 'auto' : 'none',
      }} />

      {/* panel */}
      <div
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
        style={{
          position: 'absolute',
          top: 0, right: 0, bottom: 0,
          width: '92%',
          background: 'linear-gradient(160deg, #17141f 0%, #0f0d16 100%)',
          borderLeft: '1px solid rgba(255,255,255,0.07)',
          borderBottomLeftRadius: 0,
          boxShadow: '-8px 0 40px rgba(0,0,0,0.6)',
          display: 'flex', flexDirection: 'column',
          transform: visible ? 'translateX(0)' : 'translateX(100%)',
          transition: 'transform 0.44s cubic-bezier(0.4,0,0.2,1)',
          overflow: 'hidden',
        }}
      >


        {/* SUB VIEWS — profile view, settings, notifications */}
        <ProfileEditView active={subView === 'profile'} profile={profile} onSave={saveProfile} onBack={() => setSubView(null)} />
        <SettingsView active={subView === 'settings'} onBack={() => setSubView(null)} onLogout={logout} profileName={profile.name} />
        <NotifsView active={subView === 'notifs'} notifs={notifs} onMarkRead={markRead} onMarkAll={markAll} onBack={() => setSubView(null)} />

        <div style={{ flex: 1, overflowY: 'scroll', scrollbarWidth: 'none', padding: '8px 0 20px' }}>

          {/* ── PROFILE ── */}
          <div style={{ padding: '12px 20px 20px' }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14 }}>
              {/* Avatar: 편집 가능한 프로필 사진/아바타 */}
              {renderAvatar(52, 20)}
              {/* Info */}
              <div style={{ flex: 1, paddingTop: 2 }}>
                <div style={{
                  fontFamily: "'Noto Sans KR', sans-serif",
                  fontSize: 16, fontWeight: 700, color: '#fff', letterSpacing: -0.2,
                }}>{profile.name}</div>
                <div style={{
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 11, color: 'rgba(255,255,255,0.3)',
                  letterSpacing: 0.5, marginTop: 2,

                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="rgba(255,255,255,0.5)" strokeWidth="1.8"/>
              </svg>
            </div>
            <span style={{
              fontFamily: "'Noto Sans KR', sans-serif",

          <div style={{
            margin: '12px 16px 0',
            borderRadius: 16,

            <div style={{

              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                  <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

                </svg>
                <span style={{
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 10, letterSpacing: 2,

              <button onClick={() => setSubView('notifs')} style={{
                background: 'none', border: 'none', cursor: 'pointer',

            {/* list */}
            {notifs.length === 0 ? (
              <div style={{
                padding: '16px 14px 18px', textAlign: 'center',

                {notifs.slice(0, 3).map((n, i) => (

                    display: 'flex', alignItems: 'flex-start', gap: 10,

                  }}>
                    <div style={{
                      width: 6, height: 6, borderRadius: '50%', flexShrink: 0,
                      background: n.read ? 'transparent' : ACCENT,
                      marginTop: 5,

                    <div style={{ flex: 1 }}>
                      <div style={{
                        fontFamily: "'Noto Sans KR', sans-serif",
                        fontSize: 12, fontWeight: n.read ? 300 : 400,
                        color: n.read ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.75)',
                        lineHeight: 1.5,
                      }}>{n.text}</div>
                      <div style={{
                        fontFamily: "'DM Mono', monospace",
                        fontSize: 9, color: 'rgba(255,255,255,0.2)',
                        marginTop: 2, letterSpacing: 0.5,
                      }}>{n.time}</div>
                    </div>
                    {/* mark read button */}
                    {!n.read && (
                      <button
                        onClick={() => markRead(n.id)}
                        style={{
                          background: 'none', border: 'none', cursor: 'pointer',

                          display: 'flex', alignItems: 'center', justifyContent: 'center',

                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">

  );
}

const NAV_ITEMS = [
  { id: 'home', label: '홈', Icon: HomeIcon, href: null },
  { id: 'search', label: '검색', Icon: SearchIcon, href: 'Search.html' },
  { id: 'library', label: '보관함', Icon: LibraryIcon, href: null },
  { id: 'profile', label: '프로필', Icon: ProfileIcon, href: null },
];

function HomePage() {
  const [mounted, setMounted] = useState(false);
  const [activeNav, setActiveNav] = useState('home');
  const [seeAll, setSeeAll] = useState(null);
  const [currentSongIdx, setCurrentSongIdx] = useState(() => {
    const saved = localStorage.getItem('player_songIdx');
    return saved !== null ? parseInt(saved) : 0;
  });
  const [queue, setQueueState] = useState(() => {
    try {
      const saved = localStorage.getItem('player_queue');
      if (saved) {
        const arr = JSON.parse(saved);
        if (Array.isArray(arr) && arr.length > 0) return arr;
      }
    } catch (e) {}
    return SONGS.map((_, i) => i);
  });

  const playSong = (idx) => {
    if (idx === currentSongIdx) {
      setCurrentTime(0);
      setIsPlaying(true);
      return;
    }
    const filtered = queue.filter(q => q !== idx);
    const curPos = filtered.indexOf(currentSongIdx);
    const insertAt = curPos === -1 ? filtered.length : curPos + 1;
    const next = [...filtered.slice(0, insertAt), idx, ...filtered.slice(insertAt)];
    setQueueState(next);
    setCurrentSongIdx(idx);
    setCurrentTime(0);
    setIsPlaying(true);
  };

  const [toast, setToast] = useState({ visible: false, message: '' });
  const toastTimerRef = useRef(null);
  const showToast = (message) => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setToast({ visible: true, message });
    toastTimerRef.current = setTimeout(() => setToast(t => ({ ...t, visible: false })), 2400);
  };
  const addToQueue = (idx) => {
    setQueueState([...queue, idx]);
    showToast(`재생목록에 추가됨 · ${SONGS[idx].title} — ${SONGS[idx].artist}`);
  };
  const [isPlaying, setIsPlaying] = useState(() => {
    const saved = localStorage.getItem('player_isPlaying');
    return saved === null ? true : saved === '1';
  });
  const [currentTime, setCurrentTime] = useState(() => {
    const saved = localStorage.getItem('player_currentTime');
    return saved !== null ? parseFloat(saved) : 0;
  });
  const [panelOpen, setPanelOpen] = useState(false);
  const [hasUnread, setHasUnread] = useState(MOCK_NOTIFS.some(n => !n.read));
  const [transition, setTransition] = useState('idle'); // 'idle' | 'expanding' | 'collapsing'
  const scrollRef = useRef(null);

  const song = SONGS[currentSongIdx];
  const ACCENT = '#a78bfa';
  const progress = song.duration > 0 ? currentTime / song.duration : 0;

  // Persist state for sync between Home & Player
  useEffect(() => { localStorage.setItem('player_songIdx', currentSongIdx); }, [currentSongIdx]);
  useEffect(() => { localStorage.setItem('player_isPlaying', isPlaying ? '1' : '0'); }, [isPlaying]);
  useEffect(() => { localStorage.setItem('player_currentTime', currentTime); }, [currentTime]);
  useEffect(() => { localStorage.setItem('player_queue', JSON.stringify(queue)); }, [queue]);

  // Sync from other tabs/pages — also reload state when returning from Player
  useEffect(() => {
    const sync = () => {
      const idx = localStorage.getItem('player_songIdx');
      const playing = localStorage.getItem('player_isPlaying');
      const t = localStorage.getItem('player_currentTime');
      const q = localStorage.getItem('player_queue');
      if (idx !== null) setCurrentSongIdx(parseInt(idx));
      if (playing !== null) setIsPlaying(playing === '1');
      if (t !== null) setCurrentTime(parseFloat(t));
      if (q) { try { const arr = JSON.parse(q); if (Array.isArray(arr) && arr.length) setQueueState(arr); } catch(e) {} }
    };
    window.addEventListener('storage', sync);
    window.addEventListener('focus', sync);
    return () => {
      window.removeEventListener('storage', sync);
      window.removeEventListener('focus', sync);
    };
  }, []);

  // Mount animation — handle reverse-from-player transition
  useEffect(() => {
    if (sessionStorage.getItem('returning_from_player') === '1') {
      sessionStorage.removeItem('returning_from_player');
      setTransition('collapsing');
      setMounted(true);
      // Run collapse animation, then settle
      requestAnimationFrame(() => {
        setTimeout(() => setTransition('idle'), 380);
      });
    } else {
      setTimeout(() => setMounted(true), 80);
    }
  }, []);

  // Tick playback time
  useEffect(() => {
    if (!isPlaying) return;
    const id = setInterval(() => {
      setCurrentTime(t => {
        if (t >= song.duration) return 0;
        return t + 0.5;
      });
    }, 500);
    return () => clearInterval(id);
  }, [isPlaying, song.duration]);

  // Persist position handled above via player_songIdx

  const handleNext = () => {
    if (!queue.length) return;
    const pos = queue.indexOf(currentSongIdx);
    const nextPos = pos === -1 ? 0 : (pos + 1) % queue.length;
    setCurrentSongIdx(queue[nextPos]);
    setCurrentTime(0);
  };
  const handlePrev = () => {
    if (!queue.length) return;
    const pos = queue.indexOf(currentSongIdx);
    const prevPos = pos === -1 ? 0 : (pos - 1 + queue.length) % queue.length;
    setCurrentSongIdx(queue[prevPos]);
    setCurrentTime(0);
  };
  const [playerOverlay, setPlayerOverlay] = useState('hidden'); // 'hidden' | 'opening' | 'open' | 'closing'
  const [overlayDragY, setOverlayDragY] = useState(0);
  const overlayDragRef = useRef(null);

  const goToPlayer = () => {
    if (playerOverlay !== 'hidden') return;
    setPlayerOverlay('opening');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => setPlayerOverlay('open'));
    });
  };
  const closePlayer = () => {
    if (playerOverlay === 'hidden' || playerOverlay === 'closing') return;
    setPlayerOverlay('closing');
    setOverlayDragY(0);
    setTimeout(() => setPlayerOverlay('hidden'), 380);
  };

  // Listen to messages from the Player iframe
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === 'player_close') closePlayer();
      else if (e.data.type === 'player_drag') setOverlayDragY(Math.max(0, e.data.dy || 0));
      else if (e.data.type === 'player_drag_end') {
        if ((e.data.dy || 0) > 120) closePlayer();
        else setOverlayDragY(0);
      } else if (e.data.type === 'player_queue_changed') {
        if (Array.isArray(e.data.queue) && e.data.queue.length) setQueueState(e.data.queue);
        if (typeof e.data.songIdx === 'number') setCurrentSongIdx(e.data.songIdx);
      }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [playerOverlay]);

  const getGreeting = () => {
    const h = new Date().getHours();
    const map = {
      dawn:    ["새벽의 음악은 조용히", "잠 못 드는 밤엔 음악과", "새벽 감성 충전 중", "고요한 새벽, 귀를 열어요"],
      morning: ["좋은 아침이에요", "오늘도 음악과 함께", "아침을 깨우는 플레이리스트", "상쾌한 하루의 시작"],
      noon:    ["점심 시간, 잠깐 쉬어요", "낮의 리듬을 찾아서", "오늘 점심 BGM은?", "한숨 돌리는 시간"],
      afternoon: ["오후의 여유를 즐겨요", "집중력이 필요한 시간", "오후의 감성 한 곡", "슬럼프엔 음악이지"],
      evening: ["오늘 하루 수고했어요", "퇴근길 귀를 채워요", "저녁 바람과 함께", "하루를 마무리하며"],
      night:   ["밤의 플레이리스트", "오늘 밤의 선택", "고독한 밤엔 음악이지", "밤이 깊어질수록"],
    };
    let list;
    if (h >= 4 && h < 7) list = map.dawn;
    else if (h >= 7 && h < 12) list = map.morning;
    else if (h >= 12 && h < 14) list = map.noon;
    else if (h >= 14 && h < 18) list = map.afternoon;
    else if (h >= 18 && h < 22) list = map.evening;
    else list = map.night;
    return list[Math.floor(Math.random() * list.length)];
  };
  const [greeting] = useState(getGreeting);

  return (
    <div style={{
      width: '100%', maxWidth: 430,
      height: '100dvh', maxHeight: 900,
      position: 'relative', overflow: 'hidden',
      background: '#0a0a0f',
      display: 'flex', flexDirection: 'column',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(20px)',
      transition: 'opacity 0.5s ease, transform 0.5s ease',
    }}>

      {/* ambient glow from current song */}
      <div style={{
        position: 'absolute', top: -60, left: '30%',
        width: 280, height: 280, borderRadius: '50%',
        background: `radial-gradient(circle, ${song.coverAccent}1a, transparent 70%)`,
        filter: 'blur(60px)', pointerEvents: 'none',
        transition: 'background 1.2s ease',
      }} />



      {/* SCROLLABLE CONTENT */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'scroll', scrollbarWidth: 'none' }}>

        {/* HEADER */}
        <div style={{
          padding: '4px 20px 20px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div>
            <div style={{
              fontFamily: "'DM Mono', monospace",
              fontSize: 10, letterSpacing: 2.5,
              color: 'rgba(255,255,255,0.25)', marginBottom: 4,
            }}>{greeting.toUpperCase()}</div>
            <div style={{
              fontFamily: "'Noto Serif KR', serif",
              fontSize: 24, fontWeight: 900, color: '#fff',
              letterSpacing: -0.5,
            }}>오늘의 음악</div>
          </div>
          {/* 아이콘 버튼 묶음 */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {/* Profile with badge */}
            <button
              onClick={() => setPanelOpen(true)}
              style={{
                width: 40, height: 40, borderRadius: 12,
                background: 'transparent', border: 'none',
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                position: 'relative',
              }}
            >
              {/* 계정 pfp 또는 원+사람 아이콘 */}
              {USER_PFP ? (
                <div style={{
                  width: 26, height: 26, borderRadius: '50%',
                  background: `url(${USER_PFP}) center/cover no-repeat`,
                  border: '1.5px solid rgba(255,255,255,0.2)',
                }} />
              ) : (
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                  <circle cx="13" cy="13" r="12" stroke="rgba(255,255,255,0.45)" strokeWidth="1.5"/>
                  <circle cx="13" cy="11" r="3.5" stroke="rgba(255,255,255,0.45)" strokeWidth="1.4"/>
                  <path d="M7 21.5c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="rgba(255,255,255,0.45)" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
              )}
              {/* 알림 배지 — unread 있을 때만 */}
              {hasUnread && (
                <div style={{
                  position: 'absolute', top: 5, right: 5,
                  width: 7, height: 7, borderRadius: '50%',
                  background: '#a78bfa',
                  border: '1.5px solid #0a0a0f',
                }} />
              )}
            </button>
          </div>
        </div>

        {/* FEATURED — horizontal scroll */}
        <SectionHeader title="추천 트랙" sub onSeeAll={() => setSeeAll({ title: '추천 트랙', kind: 'songs', items: SONGS.map((s, i) => ({ song: s, idx: i })) })} />
        <HScrollRow gap={14} padH={20}>
          {SONGS.slice(0, 4).map((s, i) => (
            <FeaturedCard key={i} song={s} onPlay={() => playSong(i)} />
          ))}
        </HScrollRow>

        {/* CHIP FILTERS */}
        <div style={{ margin: '28px 0 0' }}>
          <HScrollRow gap={8} padH={20}>
            {['전체', 'K-POP', '팝', '인디', '로파이', 'OST'].map((tag, i) => (
              <div
                key={tag}
                style={{
                  padding: '7px 16px', borderRadius: 20,
                  background: i === 0
                    ? 'linear-gradient(135deg, #4a2fa0, #7c3aed)'
                    : 'rgba(255,255,255,0.06)',
                  border: i === 0 ? 'none' : '1px solid rgba(255,255,255,0.08)',
                  fontFamily: "'Noto Sans KR', sans-serif",
                  fontSize: 12, fontWeight: i === 0 ? 500 : 300,
                  color: i === 0 ? '#fff' : 'rgba(255,255,255,0.45)',
                  cursor: 'pointer', flexShrink: 0,
                  boxShadow: i === 0 ? '0 4px 16px rgba(124,58,237,0.35)' : 'none',
                }}
              >{tag}</div>
            ))}
          </HScrollRow>
        </div>

        {/* RECENTLY PLAYED */}
        <div style={{ marginTop: 28 }}>
          <SectionHeader title="최근 재생" sub onSeeAll={() => setSeeAll({ title: '최근 재생', kind: 'songs', items: SONGS.map((s, i) => ({ song: s, idx: i })) })} />
          <div>
            {SONGS.slice(0, 5).map((s, i) => (
              <SongRow key={i} song={s} index={i}
                onPlay={() => playSong(i)}
                onSwipeAdd={() => addToQueue(i)} />
            ))}
          </div>
        </div>

        {/* ARTISTS */}
        <div style={{ marginTop: 28 }}>
          <SectionHeader title="좋아하는 아티스트" sub onSeeAll={() => setSeeAll({ title: '좋아하는 아티스트', kind: 'artists', items: ARTISTS })} />
          <HScrollRow gap={20} padH={20}>
            {ARTISTS.map((a, i) => <ArtistCard key={i} artist={a} />)}
          </HScrollRow>
        </div>

        {/* RECOMMENDED */}
        <div style={{ margin: '28px 0 12px' }}>
          <SectionHeader title="당신을 위한 추천" sub onSeeAll={() => setSeeAll({ title: '당신을 위한 추천', kind: 'songs', items: SONGS.map((s, i) => ({ song: s, idx: i })).reverse() })} />
          <HScrollRow gap={14} padH={20}>
            {[...SONGS].reverse().map((s, i) => (
              <CompactCard key={i} song={s}
                onPlay={() => playSong(SONGS.length - 1 - i)} />
            ))}
          </HScrollRow>
        </div>

        {/* bottom spacer for mini player + nav */}
        <div style={{ height: 180 }} />
      </div>

      {/* PROFILE PANEL */}
      <ProfilePanel visible={panelOpen} onClose={() => setPanelOpen(false)} onNotifsChange={ns => setHasUnread(ns.some(n => !n.read))} />

      {/* SEE ALL */}
      <SeeAllView config={seeAll} onClose={() => setSeeAll(null)} onPlay={(i) => playSong(i)} onAddQueue={(i) => addToQueue(i)} />

      {/* PLAYER OVERLAY — slides up over Home */}
      {playerOverlay !== 'hidden' && (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 100,
          pointerEvents: 'auto',
          overflow: 'hidden',
        }}>
          {/* dim backdrop behind iframe — subtle */}
          <div style={{
            position: 'absolute', inset: 0,
            background: 'rgba(0,0,0,0.3)',
            opacity: playerOverlay === 'open' ? 1 : 0,
            transition: 'opacity 0.38s cubic-bezier(0.4, 0, 0.2, 1)',
            pointerEvents: 'none',
          }} />
          <iframe
            src="Player.html?overlay=1"
            title="Player"
            style={{
              position: 'absolute', left: 0, right: 0, top: 0,
              width: '100%', height: '100%',
              border: 'none',
              background: 'transparent',
              transform: playerOverlay === 'open'
                ? `translateY(${overlayDragY}px)`
                : 'translateY(100%)',
              transition: overlayDragRef.current?.active
                ? 'none'
                : 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1)',
              boxShadow: '0 -8px 40px rgba(0,0,0,0.4)',
            }}
          />
        </div>
      )}

      {/* MINI PLAYER + BOTTOM NAV — fixed at bottom */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        background: 'linear-gradient(to top, #0a0a0f 60%, transparent)',
        paddingTop: 16,
        zIndex: transition !== 'idle' ? 50 : 10,
        isolation: 'isolate',
      }}>
        {/* Toast — slides up from behind mini player */}
        <div style={{
          position: 'absolute', left: 12, right: 12, bottom: '100%',
          marginBottom: -12,
          transform: toast.visible ? 'translateY(0)' : 'translateY(calc(100% + 24px))',
          opacity: toast.visible ? 1 : 0,
          transition: 'transform 0.44s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease',
          pointerEvents: 'none',
          zIndex: -1,
        }}>
          <div style={{
            background: 'rgba(28,28,36,0.96)',
            backdropFilter: 'blur(20px)',
            WebkitBackdropFilter: 'blur(20px)',
            border: '1px solid rgba(255,255,255,0.08)',
            borderRadius: 14,
            padding: '12px 16px 22px',
            color: '#fff',
            fontSize: 13,
            fontFamily: "'Noto Sans KR', sans-serif",
            fontWeight: 500,
            boxShadow: '0 8px 24px rgba(0,0,0,0.5)',
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          }}>{toast.message}</div>
        </div>
        <MiniPlayer
          song={song}
          isPlaying={isPlaying}
          onToggle={() => setIsPlaying(p => !p)}
          onNext={handleNext}
          onPrev={handlePrev}
          onClick={goToPlayer}
          progress={progress}
          fading={false}
        />

        {/* NAV BAR */}
        <div style={{
          display: 'flex', justifyContent: 'space-around', alignItems: 'center',
          padding: '8px 0 24px',
          borderTop: '1px solid rgba(255,255,255,0.04)',
        }}>
          {NAV_ITEMS.map(({ id, label, Icon, href }) => {
            const active = activeNav === id;
            const commonStyle = {
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '4px 16px',
              transition: 'opacity 0.15s ease',
              textDecoration: 'none',
            };
            const inner = (
              <>
                <Icon active={active} color={active ? ACCENT : 'rgba(255,255,255,0.3)'} />
                <span style={{
                  fontFamily: "'Noto Sans KR', sans-serif",
                  fontSize: 10, fontWeight: active ? 500 : 300,
                  color: active ? ACCENT : 'rgba(255,255,255,0.3)',
                  letterSpacing: 0.3,
                  transition: 'color 0.2s ease',
                }}>{label}</span>
              </>
            );
            if (href) {
              return (
                <a key={id} href={href} style={commonStyle}>
                  {inner}
                </a>
              );
            }
            return (
              <button
                key={id}
                onClick={() => setActiveNav(id)}
                style={commonStyle}
              >
                {inner}
              </button>
            );
          })}
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<HomePage />);
</script>
</body>
</html>
