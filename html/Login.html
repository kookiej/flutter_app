<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a0a0f; }
  body { display: flex; justify-content: center; align-items: center; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
  #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjU2IDI1NicgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSc0JyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjA0Jy8+PC9zdmc+");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// Official Spotify icon (brand mark)
function SpotifyIcon({ size = 22, color = '#191414' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color} aria-hidden="true">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.1 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.5.3z"/>
    </svg>
  );
}

function LoadingSpinner({ color }) {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin 0.8s linear infinite' }}>
      <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="2" strokeOpacity="0.25"/>
      <path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </svg>
  );
}

function LoginPage() {
  const [loading, setLoading] = useState(false);
  const [mounted, setMounted] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    setTimeout(() => setMounted(true), 80);
    // OAuth 콜백 에러 감지 (?error=...) — 앱의 에러 처리와 동일
    const err = new URLSearchParams(window.location.search).get('error');
    if (err) setError('Spotify 로그인 실패: ' + err);
  }, []);

  const handleSpotify = () => {
    if (loading) return;
    setError('');
    setLoading(true);
    // Simulated Spotify OAuth — proceed into the app once authorized
    localStorage.setItem('login_provider', 'spotify');
    setTimeout(() => {
      setLoading(false);
      window.location.href = 'Home.html';
    }, 900);
  };

  return (
    <div style={{
      width: '100%', maxWidth: 430,
      height: '100dvh', maxHeight: 900,
      position: 'relative', overflow: 'hidden',
      background: 'radial-gradient(ellipse at 50% -20%, #4a2fa0cc 0%, #2d1b6e55 35%, #0d0a18 65%, #060608 100%)',
      display: 'flex', flexDirection: 'column',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(28px)',
      transition: 'opacity 0.6s ease, transform 0.6s ease',
    }}>
      {/* ambient glow */}
      <div style={{
        position: 'absolute', top: -120, left: '50%', transform: 'translateX(-50%)',
        width: 400, height: 400, borderRadius: '50%',
        background: 'radial-gradient(circle, #7c3aed22, transparent 70%)',
        filter: 'blur(60px)', pointerEvents: 'none',
      }} />

      {/* Brand */}
      <div style={{
        flex: 1,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        paddingBottom: 20,
      }}>
        {/* Logo mark */}
        <div style={{
          width: 72, height: 72, borderRadius: 22,
          background: 'linear-gradient(135deg, #1a0a2e 0%, #4a2fa0 50%, #7c3aed 100%)',
          border: '1px solid rgba(167,139,250,0.25)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 16px 48px #7c3aed33, 0 4px 16px rgba(0,0,0,0.6)',
          marginBottom: 24,
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: '50%',
            background: 'radial-gradient(circle, rgba(0,0,0,0.9) 25%, #7c3aed55 70%)',
            border: '1px solid rgba(167,139,250,0.3)',
          }} />
          <div style={{
            position: 'absolute', width: 8, height: 8, borderRadius: '50%',
            background: '#0a0a0f', border: '1.5px solid rgba(167,139,250,0.5)',
          }} />
        </div>
        <div style={{
          fontFamily: "'Noto Serif KR', serif",
          fontSize: 30, fontWeight: 900, color: '#fff',
          letterSpacing: -0.5,
        }}>._.</div>
        <div style={{
          fontFamily: "'DM Mono', monospace",
          fontSize: 10, letterSpacing: 3,
          color: 'rgba(255,255,255,0.25)',
          marginTop: 8,
        }}>MUSIC FOR FANS</div>
      </div>

      {/* Action */}
      <div style={{ flexShrink: 0, padding: '0 32px 56px' }}>
        <button
          onClick={handleSpotify}
          disabled={loading}
          style={{
            width: '100%', height: 56, borderRadius: 28,
            background: loading ? '#1aa34a' : '#1ED760',
            border: 'none',
            color: '#191414',
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 16, fontWeight: 700, letterSpacing: 0.2,
            cursor: loading ? 'not-allowed' : 'pointer',
            boxShadow: loading ? 'none' : '0 10px 30px rgba(30,215,96,0.32)',
            transition: 'background 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
          }}
          onMouseDown={e => !loading && (e.currentTarget.style.transform = 'scale(0.97)')}
          onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
          onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}
          onTouchStart={e => !loading && (e.currentTarget.style.transform = 'scale(0.97)')}
          onTouchEnd={e => (e.currentTarget.style.transform = 'scale(1)')}
        >
          {loading ? (
            <LoadingSpinner color="#191414" />
          ) : (
            <>
              <SpotifyIcon size={22} color="#191414" />
              Spotify로 계속하기
            </>
          )}
        </button>

        {error && (
          <div style={{
            marginTop: 16,
            padding: '10px 14px',
            borderRadius: 10,
            background: 'rgba(239,68,68,0.1)',
            border: '1px solid rgba(239,68,68,0.2)',
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 13, fontWeight: 300,
            color: 'rgba(239,68,68,0.9)',
            textAlign: 'center',
          }}>{error}</div>
        )}

        <div style={{
          marginTop: 22, textAlign: 'center',
          fontFamily: "'Noto Sans KR', sans-serif",
          fontSize: 12, fontWeight: 300, lineHeight: 1.6,
          color: 'rgba(255,255,255,0.32)',
        }}>
          계속하면 <span style={{ color: 'rgba(255,255,255,0.5)' }}>이용약관</span> 및 <span style={{ color: 'rgba(255,255,255,0.5)' }}>개인정보 처리방침</span>에<br/>동의하는 것으로 간주됩니다.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<LoginPage />);
</script>
</body>
</html>
