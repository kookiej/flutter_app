function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function SongResultRow({ song, index, onPlay, onSwipeAdd, style: animStyle }) {
  const [pressed, setPressed] = useState(false);
  const [dx, setDx] = useState(0);
  const sr = useRef(null);
  const swiped = useRef(false);
  const onTS = (e) => { const t = e.touches[0]; sr.current = { x: t.clientX, y: t.clientY, locked: null }; setPressed(true); };
  const onTM = (e) => {
    if (!sr.current) return;
    const t = e.touches[0]; const ddx = t.clientX - sr.current.x; const ddy = t.clientY - sr.current.y;
    if (!sr.current.locked && (Math.abs(ddx) > 8 || Math.abs(ddy) > 8)) sr.current.locked = Math.abs(ddx) > Math.abs(ddy) ? 'h' : 'v';
    if (sr.current.locked === 'h' && ddx > 0) setDx(Math.min(ddx, 140));
  };
  const onTE = () => {
    setPressed(false);
    const wasH = sr.current?.locked === 'h'; const final = dx; sr.current = null;
    if (wasH && final > 70 && onSwipeAdd) { swiped.current = true; onSwipeAdd(); setDx(0); setTimeout(() => { swiped.current = false; }, 400); }
    else setDx(0);
  };
  const handleClick = () => { if (!swiped.current) onPlay(); };
  return (
    <div style={{ position: 'relative', overflow: 'hidden' }}>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', paddingLeft: 28,
        background: 'linear-gradient(90deg, rgba(80,160,120,0.55) 0%, rgba(80,160,120,0.12) 70%, transparent 100%)',
        opacity: dx > 0 ? Math.min(1, dx / 70) : 0,
        color: '#fff', fontSize: 13, fontFamily: "'Noto Sans KR', sans-serif", fontWeight: 500,
        pointerEvents: 'none',
      }}>＋ 재생목록에 추가</div>
    <div
      onClick={handleClick}
      onTouchStart={onTS}
      onTouchMove={onTM}
      onTouchEnd={onTE}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 12,
        padding: '10px 20px',
        background: pressed ? 'rgba(255,255,255,0.04)' : 'transparent',
        transform: `translateX(${dx}px)`,
        transition: dx === 0 ? 'transform 0.28s cubic-bezier(0.4,0,0.2,1), background 0.15s ease' : 'background 0.15s ease',
        cursor: 'pointer', touchAction: 'pan-y', position: 'relative',
        animation: 'fadeUp 0.25s ease both',
        animationDelay: `${index * 40}ms`,
        ...animStyle,
      }}
    >
      <MiniCover song={song} size={48} radius={12} />
      <div style={{ flex: 1, overflow: 'hidden' }}>
        <div style={{
          fontFamily: "'Noto Sans KR', sans-serif",
          fontSize: 14, fontWeight: 500, color: '#fff',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>{song.title}</div>
        <div style={{ fontSize: 12, fontWeight: 300, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>
          {song.artist} · {song.album}
        </div>
      </div>
      <span style={{
        fontFamily: "'DM Mono', monospace", fontSize: 11,
        color: 'rgba(255,255,255,0.2)', flexShrink: 0,
      }}>{formatTime(song.duration)}</span>
    </div>
    </div>
  );
}

function ProfilePanel({ visible, onClose }) {
  const [notifs, setNotifs] = useState(MOCK_NOTIFS);
  const swipeRef = useRef(null);
  const ACCENT = '#a78bfa';
  const hasUnread = notifs.some(n => !n.read);

  const markRead = (id) => setNotifs(ns => ns.map(n => n.id === id ? { ...n, read: true } : n));

  const handleTouchStart = (e) => { swipeRef.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (swipeRef.current === null) return;
    const dx = e.changedTouches[0].clientX - swipeRef.current;
    swipeRef.current = null;
    if (dx > 60) onClose();
  };

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 30,
      pointerEvents: visible ? 'auto' : 'none',
    }}>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: 'rgba(0,0,0,0.5)',
        opacity: visible ? 1 : 0,
        transition: 'opacity 0.4s cubic-bezier(0.4,0,0.2,1)',
        pointerEvents: visible ? 'auto' : 'none',
      }} />
      <div
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
        style={{

          transition: 'transform 0.44s cubic-bezier(0.4,0,0.2,1)',
          overflow: 'hidden',

        <div style={{ flex: 1, overflowY: 'scroll', scrollbarWidth: 'none', padding: '8px 0 20px' }}>

function SearchPage() {
  const [mounted, setMounted] = useState(false);
  const [query, setQuery] = useState('');
  const [focused, setFocused] = useState(false);
  const [results, setResults] = useState([]);
  const [recentSearches, setRecentSearches] = useState(RECENT_SEARCHES);
  const [activeTab, setActiveTab] = useState('genre'); // 'genre' | 'mood'
  const [panelOpen, setPanelOpen] = useState(false);
  const inputRef = useRef(null);
  const ACCENT = '#a78bfa';

  // Player state — synced with Home/Player via localStorage
  const [currentSongIdx, setCurrentSongIdx] = useState(() => parseInt(localStorage.getItem('player_songIdx') || '0'));
  const [isPlaying, setIsPlaying] = useState(() => localStorage.getItem('player_isPlaying') !== '0');
  const [currentTime, setCurrentTime] = useState(() => parseFloat(localStorage.getItem('player_currentTime') || '0'));
  const [queue, setQueueState] = useState(() => {
    try { const s = localStorage.getItem('player_queue'); if (s) { const a = JSON.parse(s); if (Array.isArray(a) && a.length) return a; } } catch(e) {}
    return ALL_SONGS.map((_, i) => i);
  });
  const song = ALL_SONGS[Math.min(currentSongIdx, ALL_SONGS.length - 1)] || ALL_SONGS[0];
  const progress = song.duration > 0 ? currentTime / song.duration : 0;

  useEffect(() => { localStorage.setItem('player_songIdx', currentSongIdx); }, [currentSongIdx]);
  useEffect(() => { localStorage.setItem('player_isPlaying', isPlaying ? '1' : '0'); }, [isPlaying]);
  useEffect(() => { localStorage.setItem('player_currentTime', currentTime); }, [currentTime]);
  useEffect(() => { localStorage.setItem('player_queue', JSON.stringify(queue)); }, [queue]);
  useEffect(() => {
    const sync = () => {
      const i = localStorage.getItem('player_songIdx'); if (i !== null) setCurrentSongIdx(parseInt(i));
      const p = localStorage.getItem('player_isPlaying'); if (p !== null) setIsPlaying(p === '1');
      const t = localStorage.getItem('player_currentTime'); if (t !== null) setCurrentTime(parseFloat(t));
      const q = localStorage.getItem('player_queue'); if (q) { try { const a = JSON.parse(q); if (Array.isArray(a) && a.length) setQueueState(a); } catch(e){} }
    };
    window.addEventListener('storage', sync);
    window.addEventListener('focus', sync);
    return () => { window.removeEventListener('storage', sync); window.removeEventListener('focus', sync); };
  }, []);
  useEffect(() => {
    if (!isPlaying) return;
    const id = setInterval(() => setCurrentTime(t => t >= song.duration ? 0 : t + 0.5), 500);
    return () => clearInterval(id);
  }, [isPlaying, song.duration]);

  const playSong = (idx) => {
    if (idx === currentSongIdx) { setCurrentTime(0); setIsPlaying(true); return; }
    const filtered = queue.filter(q => q !== idx);
    const curPos = filtered.indexOf(currentSongIdx);
    const insertAt = curPos === -1 ? filtered.length : curPos + 1;
    const next = [...filtered.slice(0, insertAt), idx, ...filtered.slice(insertAt)];
    setQueueState(next); setCurrentSongIdx(idx); setCurrentTime(0); setIsPlaying(true);
  };

  const [toast, setToast] = useState({ visible: false, message: '' });
  const toastTimerRef = useRef(null);
  const showToast = (message) => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setToast({ visible: true, message });
    toastTimerRef.current = setTimeout(() => setToast(t => ({ ...t, visible: false })), 2400);
  };
  const addToQueue = (idx) => {
    setQueueState([...queue, idx]);
    showToast(`재생목록에 추가됨 · ${ALL_SONGS[idx].title} — ${ALL_SONGS[idx].artist}`);
  };
  const handleNext = () => { if (!queue.length) return; const p = queue.indexOf(currentSongIdx); const n = p === -1 ? 0 : (p+1)%queue.length; setCurrentSongIdx(queue[n]); setCurrentTime(0); };
  const handlePrev = () => { if (!queue.length) return; const p = queue.indexOf(currentSongIdx); const n = p === -1 ? 0 : (p-1+queue.length)%queue.length; setCurrentSongIdx(queue[n]); setCurrentTime(0); };

  // Player overlay (iframe) — same pattern as Home
  const [playerOverlay, setPlayerOverlay] = useState('hidden');
  const [overlayDragY, setOverlayDragY] = useState(0);
  const overlayDragRef = useRef({ active: false });
  const goToPlayer = () => {
    if (playerOverlay !== 'hidden') return;
    setPlayerOverlay('opening');
    requestAnimationFrame(() => { requestAnimationFrame(() => setPlayerOverlay('open')); });
  };
  const closePlayer = () => {
    if (playerOverlay === 'hidden' || playerOverlay === 'closing') return;
    setPlayerOverlay('closing');
    setOverlayDragY(0);
    setTimeout(() => setPlayerOverlay('hidden'), 380);
  };
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === 'player_close') closePlayer();
      else if (e.data.type === 'player_drag') setOverlayDragY(Math.max(0, e.data.dy || 0));
      else if (e.data.type === 'player_drag_end') {
        if ((e.data.dy || 0) > 120) closePlayer();
        else setOverlayDragY(0);
      } else if (e.data.type === 'player_queue_changed') {
        if (Array.isArray(e.data.queue) && e.data.queue.length) setQueueState(e.data.queue);
        if (typeof e.data.songIdx === 'number') setCurrentSongIdx(e.data.songIdx);
      }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [playerOverlay]);

  useEffect(() => {
    setTimeout(() => setMounted(true), 80);
    // restore recents from localStorage
    const saved = localStorage.getItem('recent_searches');
    if (saved) setRecentSearches(JSON.parse(saved));
  }, []);

  useEffect(() => {
    if (!query.trim()) { setResults([]); return; }
    const q = query.toLowerCase();
    setResults(
      ALL_SONGS.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.artist.toLowerCase().includes(q) ||
        s.album.toLowerCase().includes(q) ||
        s.tags.some(t => t.includes(q))
      )
    );
  }, [query]);

  const saveSearch = (term) => {
    if (!term.trim()) return;
    const next = [term, ...recentSearches.filter(r => r !== term)].slice(0, 8);
    setRecentSearches(next);
    localStorage.setItem('recent_searches', JSON.stringify(next));
  };

  const removeRecent = (term) => {
    const next = recentSearches.filter(r => r !== term);
    setRecentSearches(next);
    localStorage.setItem('recent_searches', JSON.stringify(next));
  };

  const handleRecentClick = (term) => {
    setQuery(term);
    if (inputRef.current) inputRef.current.focus();
  };

  const handleSongPlay = (s) => {
    saveSearch(query);
    const idx = ALL_SONGS.indexOf(s);
    if (idx !== -1) playSong(idx);
  };
  const handleSongAdd = (s) => {
    const idx = ALL_SONGS.indexOf(s);
    if (idx !== -1) addToQueue(idx);
  };

  const isSearching = query.trim().length > 0;

  return (
    <div style={{
      width: '100%', maxWidth: 430,
      height: '100dvh', maxHeight: 900,
      position: 'relative', overflow: 'hidden',
      background: '#0a0a0f',
      display: 'flex', flexDirection: 'column',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(20px)',
      transition: 'opacity 0.5s ease, transform 0.5s ease',
    }}>

      {/* ambient glow */}
      <div style={{
        position: 'absolute', top: -80, left: '20%',
        width: 300, height: 300, borderRadius: '50%',
        background: 'radial-gradient(circle, #7c3aed12, transparent 70%)',
        filter: 'blur(60px)', pointerEvents: 'none',
      }} />

      {/* HEADER */}
      <div style={{ padding: '28px 20px 16px', flexShrink: 0 }}>
        <div style={{
          fontFamily: "'Noto Serif KR', serif",
          fontSize: 24, fontWeight: 900, color: '#fff',
          letterSpacing: -0.5, marginBottom: 16,
        }}>검색</div>

        {/* 우측 아이콘 */}
        <div style={{ position: 'absolute', top: 28, right: 20, display: 'flex', gap: 4 }}>
          <button
            onClick={() => setPanelOpen(true)}
            style={{ width: 40, height: 40, borderRadius: 12, background: 'transparent', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}
          >
            {USER_PFP ? (
              <div style={{
                width: 26, height: 26, borderRadius: '50%',
                background: `url(${USER_PFP}) center/cover no-repeat`,
                border: '1.5px solid rgba(255,255,255,0.2)',
              }} />
            ) : (
              <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <circle cx="13" cy="13" r="12" stroke="rgba(255,255,255,0.45)" strokeWidth="1.5"/>
                <circle cx="13" cy="11" r="3.5" stroke="rgba(255,255,255,0.45)" strokeWidth="1.4"/>
                <path d="M7 21.5c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="rgba(255,255,255,0.45)" strokeWidth="1.4" strokeLinecap="round"/>
              </svg>
            )}
            {MOCK_NOTIFS.some(n => !n.read) && (
              <div style={{
                position: 'absolute', top: 5, right: 5,
                width: 7, height: 7, borderRadius: '50%',
                background: '#a78bfa', border: '1.5px solid #0a0a0f',
              }} />
            )}
          </button>
        </div>

        {/* Search input */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '0 16px',
          height: 48,
          borderRadius: 14,
          background: focused ? 'rgba(167,139,250,0.07)' : 'rgba(255,255,255,0.05)',
          border: `1px solid ${focused ? 'rgba(167,139,250,0.3)' : 'rgba(255,255,255,0.07)'}`,
          transition: 'border-color 0.25s ease, background 0.25s ease',
          position: 'relative', overflow: 'hidden',
        }}>
          <SearchIcon color={focused ? ACCENT : 'rgba(255,255,255,0.25)'} />
          <input
            ref={inputRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            onKeyDown={e => { if (e.key === 'Enter') saveSearch(query); }}
            placeholder="아티스트, 곡, 앨범 검색"
            style={{
              flex: 1, background: 'transparent', border: 'none', outline: 'none',
              color: '#fff', fontFamily: "'Noto Sans KR', sans-serif",
              fontSize: 15, fontWeight: 300,
            }}
          />
          {query.length > 0 && (
            <button
              onClick={() => setQuery('')}
              style={{
                background: 'rgba(255,255,255,0.1)', border: 'none', cursor: 'pointer',
                width: 22, height: 22, borderRadius: '50%',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}
            >
              <CloseIcon color="rgba(255,255,255,0.6)" />
            </button>
          )}
          {/* focus bottom glow */}
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0, height: 1,
            background: `linear-gradient(90deg, transparent, ${ACCENT}, transparent)`,
            opacity: focused ? 1 : 0, transition: 'opacity 0.3s ease',
          }} />
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ flex: 1, overflowY: 'scroll', scrollbarWidth: 'none' }}>

        {/* ── SEARCH RESULTS ── */}
        {isSearching && (
          <div>
            {results.length === 0 ? (
              <div style={{
                padding: '60px 20px', textAlign: 'center',
                animation: 'fadeUp 0.3s ease',
              }}>
                <div style={{
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 11, letterSpacing: 2,
                  color: 'rgba(255,255,255,0.15)', marginBottom: 10,
                }}>NO RESULTS</div>
                <div style={{
                  fontFamily: "'Noto Serif KR', serif",
                  fontSize: 18, color: 'rgba(255,255,255,0.4)',
                }}>"{query}"</div>
                <div style={{
                  fontFamily: "'Noto Sans KR', sans-serif",
                  fontSize: 13, fontWeight: 300,
                  color: 'rgba(255,255,255,0.2)', marginTop: 8,
                }}>다른 검색어를 시도해 보세요</div>
              </div>
            ) : (
              <div>
                <div style={{
                  padding: '0 20px 12px',
                  fontFamily: "'DM Mono', monospace",
                  fontSize: 10, letterSpacing: 2,
                  color: 'rgba(255,255,255,0.25)',
                }}>결과 {results.length}곡</div>
                {results.map((s, i) => (

            )}
          </div>
        )}

        {/* ── DEFAULT STATE ── */}
        {!isSearching && (
          <div>
            {/* Recent searches */}
            {recentSearches.length > 0 && (
              <div style={{ marginBottom: 28 }}>
                <div style={{
                  display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  padding: '0 20px', marginBottom: 12,
                }}>
                  <span style={{
                    fontFamily: "'DM Mono', monospace",
                    fontSize: 10, letterSpacing: 2,
                    color: 'rgba(255,255,255,0.25)',
                  }}>최근 검색</span>
                  <button
                    onClick={() => { setRecentSearches([]); localStorage.removeItem('recent_searches'); }}
                    style={{
                      background: 'none', border: 'none', cursor: 'pointer',
                      fontFamily: "'DM Mono', monospace",
                      fontSize: 10, color: 'rgba(167,139,250,0.5)',
                      letterSpacing: 1,
                    }}
                  >전체 삭제</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column' }}>
                  {recentSearches.map((term, i) => (
                    <div
                      key={term}

                        display: 'flex', alignItems: 'center', gap: 12,
                        padding: '11px 20px',

            )}

            {/* Tab: genre / mood */}
            <div style={{ padding: '0 20px', marginBottom: 16 }}>
              <div style={{
                display: 'flex', gap: 0,
                background: 'rgba(255,255,255,0.04)',
                border: '1px solid rgba(255,255,255,0.06)',
                borderRadius: 12, padding: 3,
              }}>
                {[{ id: 'genre', label: '장르' }, { id: 'mood', label: '무드' }].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      flex: 1, padding: '8px 0', borderRadius: 9,
                      border: 'none', cursor: 'pointer',
                      background: activeTab === tab.id
                        ? 'linear-gradient(135deg, #4a2fa0, #7c3aed)'
                        : 'transparent',
                      fontFamily: "'Noto Sans KR', sans-serif",
                      fontSize: 13, fontWeight: activeTab === tab.id ? 500 : 300,
                      color: activeTab === tab.id ? '#fff' : 'rgba(255,255,255,0.35)',
                      transition: 'all 0.2s ease',
                      boxShadow: activeTab === tab.id ? '0 2px 12px rgba(124,58,237,0.4)' : 'none',
                    }}
                  >{tab.label}</button>
                ))}
              </div>
            </div>

            {activeTab === 'genre' ? <GenreGrid /> : <MoodRow />}

            {/* spacer */}
            <div style={{ height: 180 }} />
          </div>
        )}

        {isSearching && <div style={{ height: 180 }} />}
      </div>

      {/* PROFILE PANEL */}
      <ProfilePanel visible={panelOpen} onClose={() => setPanelOpen(false)} />

      {/* PLAYER OVERLAY — slides up over Search */}
      {playerOverlay !== 'hidden' && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 100, pointerEvents: 'auto', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.3)',
            opacity: playerOverlay === 'open' ? 1 : 0,
            transition: 'opacity 0.38s cubic-bezier(0.4, 0, 0.2, 1)',
            pointerEvents: 'none',
          }} />
          <iframe
            src="Player.html?overlay=1"
            title="Player"
            style={{
              position: 'absolute', left: 0, right: 0, top: 0,
              width: '100%', height: '100%', border: 'none', background: 'transparent',
              transform: playerOverlay === 'open'
                ? `translateY(${overlayDragY}px)`
                : 'translateY(100%)',
              transition: overlayDragRef.current?.active ? 'none' : 'transform 0.38s cubic-bezier(0.4, 0, 0.2, 1)',
              boxShadow: '0 -8px 40px rgba(0,0,0,0.4)',
            }}
          />
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0,
        background: 'linear-gradient(to top, #0a0a0f 70%, transparent)',
        paddingTop: 12,
        zIndex: 10,
        isolation: 'isolate',
      }}>
        {/* Toast — slides up from behind mini player */}
        <div style={{
          position: 'absolute', left: 12, right: 12, bottom: '100%',
          marginBottom: -12,
          transform: toast.visible ? 'translateY(0)' : 'translateY(calc(100% + 24px))',
          opacity: toast.visible ? 1 : 0,
          transition: 'transform 0.44s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease',
          pointerEvents: 'none',
          zIndex: -1,
        }}>
          <div style={{
            background: 'rgba(28,28,36,0.96)',
            backdropFilter: 'blur(20px)',
            WebkitBackdropFilter: 'blur(20px)',
            border: '1px solid rgba(255,255,255,0.08)',
            borderRadius: 14,
            padding: '12px 16px 22px',
            color: '#fff',
            fontSize: 13,
            fontFamily: "'Noto Sans KR', sans-serif",
            fontWeight: 500,
            boxShadow: '0 8px 24px rgba(0,0,0,0.5)',
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          }}>{toast.message}</div>
        </div>
        <MiniPlayerBar
          song={song} isPlaying={isPlaying} progress={progress}
          onToggle={() => setIsPlaying(p => !p)}
          onNext={handleNext} onPrev={handlePrev}
          onClick={goToPlayer}
        />
        <div style={{
          display: 'flex', justifyContent: 'space-around', alignItems: 'center',
          padding: '8px 0 24px',
          borderTop: '1px solid rgba(255,255,255,0.04)',
        }}>
          {NAV_ITEMS.map(({ id, label, Icon, href }) => {
            const active = id === 'search';
            return (
              <button
                key={id}
                onClick={() => { if (href) window.location.href = href; }}
                style={{
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                  background: 'none', border: 'none', cursor: 'pointer',
                  padding: '4px 16px',
                }}
              >
                <Icon active={active} color={active ? ACCENT : 'rgba(255,255,255,0.3)'} />
                <span style={{
                  fontFamily: "'Noto Sans KR', sans-serif",
                  fontSize: 10, fontWeight: active ? 500 : 300,
                  color: active ? ACCENT : 'rgba(255,255,255,0.3)',
                  letterSpacing: 0.3,
                }}>{label}</span>
              </button>
            );
          })}
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SearchPage />);
</script>
</body>
</html>
