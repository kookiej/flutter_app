<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Continue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a0a0f; }
  body { display: flex; justify-content: center; align-items: center; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
  #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjU2IDI1NicgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSc0JyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjA0Jy8+PC9zdmc+");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-text-fill-color: #fff;
    -webkit-box-shadow: 0 0 0px 1000px #1a0e2e inset;
    transition: background-color 5000s ease-in-out 0s;
    caret-color: #a78bfa;
  }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const ACCENT = '#a78bfa';

function EyeIcon({ open, color }) {
  return open ? (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx="12" cy="12" r="3" stroke={color} strokeWidth="1.8"/>
    </svg>
  ) : (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
  );
}

function BackIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M15 18l-6-6 6-6" stroke="rgba(255,255,255,0.6)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function CheckIcon({ active }) {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
      <path d="M20 6L9 17l-5-5" stroke={active ? ACCENT : 'rgba(255,255,255,0.25)'} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function LoadingSpinner({ color }) {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin 0.8s linear infinite' }}>
      <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="2" strokeOpacity="0.25"/>
      <path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </svg>
  );
}

function InputField({ label, type, value, onChange, placeholder, rightEl, autoFocus }) {
  const [focused, setFocused] = useState(false);
  const ref = useRef(null);
  useEffect(() => { if (autoFocus && ref.current) ref.current.focus(); }, [autoFocus]);
  return (
    <div style={{ position: 'relative', marginBottom: 16 }}>
      <label style={{
        display: 'block',
        fontFamily: "'DM Mono', monospace",
        fontSize: 10, letterSpacing: 2,
        color: focused ? ACCENT : 'rgba(255,255,255,0.3)',
        marginBottom: 8,
        transition: 'color 0.2s ease',
      }}>{label}</label>
      <div style={{
        position: 'relative',
        border: `1px solid ${focused ? '#a78bfa44' : 'rgba(255,255,255,0.08)'}`,
        borderRadius: 14,
        background: focused ? 'rgba(167,139,250,0.05)' : 'rgba(255,255,255,0.03)',
        transition: 'border-color 0.25s ease, background 0.25s ease',
        overflow: 'hidden',
      }}>
        <input
          ref={ref}
          type={type}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{
            width: '100%', padding: '15px 18px',
            paddingRight: rightEl ? 52 : 18,
            background: 'transparent',
            border: 'none', outline: 'none',
            color: '#fff',
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 15, fontWeight: 300,
            letterSpacing: 0.3,
          }}
        />
        {rightEl && (
          <div style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)' }}>
            {rightEl}
          </div>
        )}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, height: 1,
          background: `linear-gradient(90deg, transparent, #a78bfa, transparent)`,
          opacity: focused ? 1 : 0,
          transition: 'opacity 0.3s ease',
        }} />
      </div>
    </div>
  );
}

function PrimaryButton({ onClick, loading, disabled, children }) {
  const off = loading || disabled;
  return (
    <button
      onClick={onClick}
      disabled={off}
      style={{
        width: '100%', height: 54, borderRadius: 16,
        background: off
          ? 'rgba(167,139,250,0.18)'
          : 'linear-gradient(135deg, #4a2fa0, #7c3aed)',
        border: '1px solid rgba(167,139,250,0.3)',
        color: off ? 'rgba(255,255,255,0.4)' : '#fff',
        fontFamily: "'Noto Sans KR', sans-serif",
        fontSize: 15, fontWeight: 500, letterSpacing: 0.5,
        cursor: off ? 'not-allowed' : 'pointer',
        boxShadow: off ? 'none' : '0 8px 32px rgba(124,58,237,0.4)',
        transition: 'all 0.3s ease',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      }}
      onMouseDown={e => !off && (e.currentTarget.style.transform = 'scale(0.97)')}
      onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
      onTouchStart={e => !off && (e.currentTarget.style.transform = 'scale(0.97)')}
      onTouchEnd={e => (e.currentTarget.style.transform = 'scale(1)')}
    >
      {loading ? <LoadingSpinner color="#fff" /> : children}
    </button>
  );
}

function Shell({ onBack, stepLabel, children }) {
  const [mounted, setMounted] = useState(false);
  useEffect(() => { setTimeout(() => setMounted(true), 60); }, []);
  return (
    <div style={{
      width: '100%', maxWidth: 430,
      height: '100dvh', maxHeight: 900,
      position: 'relative', overflow: 'hidden',
      background: 'radial-gradient(ellipse at 50% -20%, #4a2fa0cc 0%, #2d1b6e55 35%, #0d0a18 65%, #060608 100%)',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{
        position: 'absolute', top: -120, left: '50%', transform: 'translateX(-50%)',
        width: 400, height: 400, borderRadius: '50%',
        background: 'radial-gradient(circle, #7c3aed22, transparent 70%)',
        filter: 'blur(60px)', pointerEvents: 'none',
      }} />

      {/* Top bar */}
      <div style={{
        paddingTop: 26, paddingLeft: 22, paddingRight: 22, paddingBottom: 6,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        flexShrink: 0, zIndex: 2,
      }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', cursor: 'pointer', padding: 6,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          marginLeft: -6,
        }}>
          <BackIcon />
        </button>
        {stepLabel && (
          <span style={{
            fontFamily: "'DM Mono', monospace", fontSize: 11,
            letterSpacing: 2, color: 'rgba(255,255,255,0.3)',
          }}>{stepLabel}</span>
        )}
      </div>

      <div style={{
        flex: 1, overflowY: 'auto', padding: '20px 32px 40px', scrollbarWidth: 'none',
        opacity: mounted ? 1 : 0,
        transform: mounted ? 'translateY(0)' : 'translateY(16px)',
        transition: 'opacity 0.4s ease, transform 0.4s ease',
      }}>
        {children}
      </div>
    </div>
  );
}

function Title({ children }) {
  return (
    <div style={{
      fontFamily: "'Noto Serif KR', serif",
      fontSize: 24, fontWeight: 700, color: '#fff',
      letterSpacing: -0.5, lineHeight: 1.35, marginBottom: 10,
    }}>{children}</div>
  );
}

function Sub({ children }) {
  return (
    <div style={{
      fontFamily: "'Noto Sans KR', sans-serif",
      fontSize: 14, fontWeight: 300, lineHeight: 1.6,
      color: 'rgba(255,255,255,0.5)', marginBottom: 32,
    }}>{children}</div>
  );
}

function EmailChip({ email }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      padding: '7px 14px', borderRadius: 999,
      background: 'rgba(167,139,250,0.1)',
      border: '1px solid rgba(167,139,250,0.2)',
      marginBottom: 24,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: ACCENT }} />
      <span style={{
        fontFamily: "'DM Mono', monospace", fontSize: 12,
        color: 'rgba(255,255,255,0.7)', letterSpacing: 0.3,
      }}>{email}</span>
    </div>
  );
}

function ErrorBox({ children }) {
  if (!children) return null;
  return (
    <div style={{
      marginBottom: 16, padding: '10px 14px', borderRadius: 10,
      background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.2)',
      color: '#fca5a5', fontSize: 13, fontWeight: 300,
    }}>{children}</div>
  );
}

// ---- Existing member: enter password ----
function ExistingFlow({ email, account, onBack }) {
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [sentReset, setSentReset] = useState(false);

  const handleLogin = () => {
    if (!password) { setError('비밀번호를 입력해 주세요.'); return; }
    setLoading(true);
    setTimeout(() => {
      if (password === account.password) {
        localStorage.setItem('current_user', JSON.stringify({ email, name: account.name }));
        window.location.href = 'Home.html';
      } else {
        setLoading(false);
        setError('비밀번호가 일치하지 않습니다.');
      }
    }, 800);
  };

  return (
    <Shell onBack={onBack} stepLabel="로그인">
      <EmailChip email={email} />
      <Title>다시 오셨네요{account.name ? `, ${account.name}님` : ''}</Title>
      <Sub>비밀번호를 입력하고 로그인하세요.</Sub>

      <InputField
        label="비밀번호"
        type={showPw ? 'text' : 'password'}
        value={password}
        onChange={v => { setPassword(v); setError(''); }}
        placeholder="••••••••"
        autoFocus
        rightEl={
          <button onClick={() => setShowPw(s => !s)} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 4,
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <EyeIcon open={showPw} color="rgba(255,255,255,0.3)" />
          </button>
        }
      />

      <ErrorBox>{error}</ErrorBox>

      <div style={{ textAlign: 'right', marginBottom: 28 }}>
        <a href="#" onClick={e => { e.preventDefault(); setSentReset(true); }} style={{
          fontFamily: "'DM Mono', monospace", fontSize: 11,
          color: 'rgba(167,139,250,0.6)', letterSpacing: 0.5, textDecoration: 'none',
        }}>비밀번호 찾기</a>
      </div>

      {sentReset && (
        <div style={{
          marginBottom: 20, padding: '12px 14px', borderRadius: 12,
          background: 'rgba(167,139,250,0.08)', border: '1px solid rgba(167,139,250,0.2)',
          color: 'rgba(255,255,255,0.65)', fontSize: 13, fontWeight: 300, lineHeight: 1.55,
        }}>
          <strong style={{ color: ACCENT, fontWeight: 500 }}>{email}</strong> 으로<br/>
          비밀번호 재설정 링크를 보냈어요.
        </div>
      )}

      <PrimaryButton onClick={handleLogin} loading={loading}>로그인</PrimaryButton>
    </Shell>
  );
}

// ---- New member: signup (password -> name) ----
function PwRule({ ok, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{
        width: 18, height: 18, borderRadius: '50%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: ok ? 'rgba(167,139,250,0.15)' : 'rgba(255,255,255,0.04)',
        border: `1px solid ${ok ? 'rgba(167,139,250,0.4)' : 'rgba(255,255,255,0.1)'}`,
        transition: 'all 0.2s ease',
      }}>
        <CheckIcon active={ok} />
      </span>
      <span style={{
        fontSize: 12.5, fontWeight: 300,
        color: ok ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.4)',
        transition: 'color 0.2s ease',
      }}>{label}</span>
    </div>
  );
}

function SignupFlow({ email, onBack }) {
  const [step, setStep] = useState(0); // 0 = password, 1 = name
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);

  const hasLen = password.length >= 8;
  const hasAlpha = /[a-zA-Z]/.test(password);
  const hasNum = /[0-9]/.test(password);
  const hasSpecial = /[^a-zA-Z0-9]/.test(password);
  const pwValid = hasLen && hasAlpha && hasNum && hasSpecial;

  const finish = () => {
    setLoading(true);
    setTimeout(() => {
      const users = JSON.parse(localStorage.getItem('registered_users') || '{}');
      users[email] = { password, name: name.trim() };
      localStorage.setItem('registered_users', JSON.stringify(users));
      localStorage.setItem('current_user', JSON.stringify({ email, name: name.trim() }));
      window.location.href = 'Home.html';
    }, 900);
  };

  if (step === 0) {
    return (
      <Shell onBack={onBack} stepLabel="가입 1 / 2">
        <EmailChip email={email} />
        <Title>비밀번호를 설정해 주세요</Title>
        <Sub>안전한 계정을 위해 아래 조건을 만족하는 비밀번호를 만들어 주세요.</Sub>

        <InputField
          label="비밀번호"
          type={showPw ? 'text' : 'password'}
          value={password}
          onChange={setPassword}
          placeholder="••••••••"
          autoFocus
          rightEl={
            <button onClick={() => setShowPw(s => !s)} style={{
              background: 'none', border: 'none', cursor: 'pointer', padding: 4,
              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <EyeIcon open={showPw} color="rgba(255,255,255,0.3)" />
            </button>
          }
        />

        <div style={{
          display: 'flex', flexDirection: 'column', gap: 10,
          margin: '4px 2px 32px',
        }}>
          <PwRule ok={hasLen} label="8자 이상" />
          <PwRule ok={hasAlpha} label="영문자 포함" />
          <PwRule ok={hasNum} label="숫자 포함" />
          <PwRule ok={hasSpecial} label="특수문자 포함" />
        </div>

        <PrimaryButton onClick={() => setStep(1)} disabled={!pwValid}>다음</PrimaryButton>
      </Shell>
    );
  }

  return (
    <Shell onBack={() => setStep(0)} stepLabel="가입 2 / 2">
      <EmailChip email={email} />
      <Title>어떻게 불러드릴까요?</Title>
      <Sub>프로필과 활동에 표시될 이름이에요. 나중에 바꿀 수 있어요.</Sub>

      <InputField
        label="이름"
        type="text"
        value={name}
        onChange={setName}
        placeholder="이름을 입력하세요"
        autoFocus
      />

      <div style={{ marginBottom: 24 }} />

      <PrimaryButton onClick={finish} loading={loading} disabled={!name.trim()}>
        시작하기
      </PrimaryButton>
    </Shell>
  );
}

function App() {
  const [ready, setReady] = useState(false);
  const [email, setEmail] = useState('');
  const [account, setAccount] = useState(null); // null = new member

  useEffect(() => {
    const e = localStorage.getItem('login_email') || '';
    if (!e) { window.location.href = 'Login.html'; return; }
    setEmail(e);
    const users = JSON.parse(localStorage.getItem('registered_users') || '{}');
    setAccount(users[e] || null);
    setReady(true);
  }, []);

  const goBack = () => { window.location.href = 'Login.html'; };

  if (!ready) return null;

  return account
    ? <ExistingFlow email={email} account={account} onBack={goBack} />
    : <SignupFlow email={email} onBack={goBack} />;
}

// Seed a demo existing account so the "기존 회원" flow is testable
(function seedDemo() {
  const users = JSON.parse(localStorage.getItem('registered_users') || '{}');
  if (!users['hello@example.com']) {
    users['hello@example.com'] = { password: 'demo1234!', name: '데모' };
    localStorage.setItem('registered_users', JSON.stringify(users));
  }
})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
