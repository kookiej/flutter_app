<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a0a0f; }
  body { display: flex; justify-content: center; align-items: center; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
  #root { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PScwIDAgMjU2IDI1NicgeG1sbnM9J2h0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPSc0JyBzdGl0Y2hUaWxlcz0nc3RpdGNoJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJyBvcGFjaXR5PScwLjA0Jy8+PC9zdmc+");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-text-fill-color: #fff;
    -webkit-box-shadow: 0 0 0px 1000px #1a0e2e inset;
    transition: background-color 5000s ease-in-out 0s;
    caret-color: #a78bfa;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function EyeIcon({ open, color }) {
  return open ? (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx="12" cy="12" r="3" stroke={color} strokeWidth="1.8"/>
    </svg>
  ) : (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
  );
}

function InputField({ label, type, value, onChange, placeholder, rightEl }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{ position: 'relative', marginBottom: 16 }}>
      <label style={{
        display: 'block',
        fontFamily: "'DM Mono', monospace",
        fontSize: 10, letterSpacing: 2,
        color: focused ? '#a78bfa' : 'rgba(255,255,255,0.3)',
        marginBottom: 8,
        transition: 'color 0.2s ease',
      }}>{label}</label>
      <div style={{
        position: 'relative',
        border: `1px solid ${focused ? '#a78bfa44' : 'rgba(255,255,255,0.08)'}`,
        borderRadius: 14,
        background: focused ? 'rgba(167,139,250,0.05)' : 'rgba(255,255,255,0.03)',
        transition: 'border-color 0.25s ease, background 0.25s ease',
        overflow: 'hidden',
      }}>
        <input
          type={type}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          style={{
            width: '100%', padding: '15px 18px',
            paddingRight: rightEl ? 52 : 18,
            background: 'transparent',
            border: 'none', outline: 'none',
            color: '#fff',
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 15, fontWeight: 300,
            letterSpacing: 0.3,
          }}
        />
        {rightEl && (
          <div style={{
            position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)',
          }}>
            {rightEl}
          </div>
        )}
        {/* focus glow bottom line */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, height: 1,
          background: `linear-gradient(90deg, transparent, #a78bfa, transparent)`,
          opacity: focused ? 1 : 0,
          transition: 'opacity 0.3s ease',
        }} />
      </div>
    </div>
  );
}

function LoginPage() {
  const [email, setEmail] = useState('');
  const [loading, setLoading] = useState(false);
  const [mounted, setMounted] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => { setTimeout(() => setMounted(true), 80); }, []);

  // Persist email across page loads
  useEffect(() => {
    const saved = localStorage.getItem('login_email');
    if (saved) setEmail(saved);
  }, []);
  useEffect(() => { localStorage.setItem('login_email', email); }, [email]);

  const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  const handleContinue = () => {
    if (!validEmail) { setError('올바른 이메일을 입력해 주세요.'); return; }
    setError('');
    setLoading(true);
    localStorage.setItem('login_email', email);
    setTimeout(() => {
      setLoading(false);
      window.location.href = 'Continue.html';
    }, 700);
  };

  const ACCENT = '#a78bfa';

  return (
    <div style={{
      width: '100%', maxWidth: 430,
      height: '100dvh', maxHeight: 900,
      position: 'relative', overflow: 'hidden',
      background: 'radial-gradient(ellipse at 50% -20%, #4a2fa0cc 0%, #2d1b6e55 35%, #0d0a18 65%, #060608 100%)',
      display: 'flex', flexDirection: 'column',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(28px)',
      transition: 'opacity 0.6s ease, transform 0.6s ease',
    }}>
      {/* ambient glow */}
      <div style={{
        position: 'absolute', top: -120, left: '50%', transform: 'translateX(-50%)',
        width: 400, height: 400, borderRadius: '50%',
        background: 'radial-gradient(circle, #7c3aed22, transparent 70%)',
        filter: 'blur(60px)', pointerEvents: 'none',
      }} />

      {/* Logo area */}
      <div style={{
        paddingTop: 80, paddingBottom: 48,
        display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0,
      }}>
        {/* Logo mark */}
        <div style={{
          width: 64, height: 64, borderRadius: 20,
          background: 'linear-gradient(135deg, #1a0a2e 0%, #4a2fa0 50%, #7c3aed 100%)',
          border: '1px solid rgba(167,139,250,0.25)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 16px 48px #7c3aed33, 0 4px 16px rgba(0,0,0,0.6)',
          marginBottom: 20,
          position: 'relative', overflow: 'hidden',
        }}>
          {/* vinyl mini */}
          <div style={{
            width: 28, height: 28, borderRadius: '50%',
            background: 'radial-gradient(circle, rgba(0,0,0,0.9) 25%, #7c3aed55 70%)',
            border: '1px solid rgba(167,139,250,0.3)',
          }} />
          <div style={{
            position: 'absolute', width: 7, height: 7, borderRadius: '50%',
            background: '#0a0a0f', border: '1.5px solid rgba(167,139,250,0.5)',
          }} />
        </div>
        <div style={{
          fontFamily: "'Noto Serif KR', serif",
          fontSize: 26, fontWeight: 900, color: '#fff',
          letterSpacing: -0.5,
        }}>._.</div>
        <div style={{
          fontFamily: "'DM Mono', monospace",
          fontSize: 10, letterSpacing: 3,
          color: 'rgba(255,255,255,0.25)',
          marginTop: 6,
        }}>MUSIC FOR FANS</div>
      </div>

      {/* Form */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 32px 40px', scrollbarWidth: 'none' }}>
        <div style={{
          fontFamily: "'Noto Serif KR', serif",
          fontSize: 20, fontWeight: 700, color: '#fff',
          letterSpacing: -0.3, marginBottom: 28,
        }}>로그인</div>

        <InputField
          label="이메일"
          type="email"
          value={email}
          onChange={setEmail}
          placeholder="hello@example.com"
        />

        {/* Error */}
        {error && (
          <div style={{
            marginBottom: 16, padding: '10px 14px', borderRadius: 10,
            background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.2)',
            color: '#fca5a5', fontSize: 13, fontWeight: 300,
          }}>{error}</div>
        )}

        <div style={{ marginBottom: 28 }} />

        {/* Continue button */}
        <button
          onClick={handleContinue}
          disabled={loading}
          style={{
            width: '100%', height: 54, borderRadius: 16,
            background: loading
              ? 'rgba(167,139,250,0.3)'
              : 'linear-gradient(135deg, #4a2fa0, #7c3aed)',
            border: '1px solid rgba(167,139,250,0.3)',
            color: '#fff',
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 15, fontWeight: 500, letterSpacing: 0.5,
            cursor: loading ? 'not-allowed' : 'pointer',
            boxShadow: loading ? 'none' : '0 8px 32px rgba(124,58,237,0.4)',
            transition: 'all 0.3s ease',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
          }}
          onMouseDown={e => !loading && (e.currentTarget.style.transform = 'scale(0.97)')}
          onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
          onTouchStart={e => !loading && (e.currentTarget.style.transform = 'scale(0.97)')}
          onTouchEnd={e => (e.currentTarget.style.transform = 'scale(1)')}
        >
          {loading ? (
            <LoadingSpinner color="#fff" />
          ) : '이메일로 계속하기'}
        </button>

        {/* Divider */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 14,
          margin: '28px 0',
        }}>
          <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.07)' }} />
          <span style={{
            fontFamily: "'DM Mono', monospace", fontSize: 10,
            color: 'rgba(255,255,255,0.2)', letterSpacing: 2,
          }}>OR</span>
          <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.07)' }} />
        </div>

        {/* Social logins */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[
            { label: '카카오로 계속하기', bg: '#FEE500', color: '#191919', icon: KakaoIcon },
            { label: '네이버로 계속하기', bg: '#ffffff', color: '#191919', icon: NaverIcon },
            { label: 'Apple로 계속하기', bg: 'rgba(255,255,255,0.06)', color: '#fff', icon: AppleIcon, border: '1px solid rgba(255,255,255,0.1)' },
          ].map(({ label, bg, color, icon: Icon, border }) => (
            <button
              key={label}
              style={{
                width: '100%', height: 50, borderRadius: 14,
                background: bg, border: border || 'none',
                color, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                fontFamily: "'Noto Sans KR', sans-serif",
                fontSize: 14, fontWeight: 500,
                transition: 'opacity 0.15s ease, transform 0.12s ease',
              }}
              onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
              onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
              onTouchStart={e => e.currentTarget.style.transform = 'scale(0.97)'}
              onTouchEnd={e => e.currentTarget.style.transform = 'scale(1)'}
            >
              <Icon />
              {label}
            </button>
          ))}
        </div>
      </div>

      <style>{`::-webkit-scrollbar { display: none; }`}</style>
    </div>
  );
}

function LoadingSpinner({ color }) {
  return (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin 0.8s linear infinite' }}>
      <circle cx="12" cy="12" r="9" stroke={color} strokeWidth="2" strokeOpacity="0.25"/>
      <path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </svg>
  );
}

function KakaoIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#191919">
      <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.712 1.67 5.1 4.2 6.54l-1.07 3.96 4.63-3.06c.73.1 1.49.16 2.24.16 5.523 0 10-3.477 10-7.8S17.523 3 12 3z"/>
    </svg>
  );
}

function NaverIcon() {
  return (
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
      <path d="M3.6 3.6h4.4l4 6.2V3.6h4.4v12.8h-4.4l-4-6.2v6.2H3.6V3.6z" fill="#03C75A"/>
    </svg>
  );
}

function AppleIcon() {
  return (
    <svg width="17" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
    </svg>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<LoginPage />);
</script>
</body>
</html>
